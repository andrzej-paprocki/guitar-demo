<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guitar</title>

  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      justify-content: center;
      background-color: pink;
    }

    h1 {
      font-size: 50px;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      letter-spacing: 4px;
      color: white;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      white-space: nowrap;
    }

    .box {
      display: flex;
    }

    .string {
      height: 300px;
      width: 20px;
      background-color: lightgrey;
      margin: 5px 30px 5px 0;
      text-align: center;
      border: 1px solid black;
      cursor: pointer;
      user-select: none;
      transition: 0.1s;
    }

    .string.active {
      background-color: orange;
    }

    button {
      margin-bottom: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>Guitar</h1>

  <button id="playBtn">Играть последовательность</button>

  <div class="box">
    <div class="string" data-string="6">6</div>
    <div class="string" data-string="5">5</div>
    <div class="string" data-string="4">4</div>
    <div class="string" data-string="3">3</div>
    <div class="string" data-string="2">2</div>
    <div class="string" data-string="1">1</div>
  </div>

  <script>
    // Аудио для каждой струны
    const audios = {
      "6": new Audio("sounds/6.mp3"),
      "5": new Audio("sounds/5.mp3"),
      "4": new Audio("sounds/4.mp3"),
      "3": new Audio("sounds/3.mp3"),
      "2": new Audio("sounds/2.mp3"),
      "1": new Audio("sounds/1.mp3")
    };

    // Предзагрузка аудио, чтобы убрать задержку при первом воспроизведении
    for (let key in audios) {
      const audio = audios[key];
      audio.preload = "auto";
      audio.play().then(() => audio.pause()).catch(() => {});
    }

    // Функция воспроизведения струны с подсветкой
    function playString(num) {
      const audio = audios[num];
      if (!audio) return;

      audio.currentTime = 0;
      audio.play().catch(err => console.warn("Ошибка воспроизведения:", err));

      const el = document.querySelector(`[data-string="${num}"]`);
      if (el) {
        el.classList.add("active");
        setTimeout(() => el.classList.remove("active"), 100);
      }
    }

    // Наведение мыши на струну
    document.querySelectorAll(".string").forEach(el => {
      el.addEventListener("mouseover", () => {
        playString(el.dataset.string);
      });
    });

    // Воспроизведение последовательности струн
    function playMelody(sequence, speed = 300) {
      return new Promise(resolve => {
        let i = 0;
        function step() {
          if (i >= sequence.length) {
            resolve();
            return;
          }
          const note = sequence[i];
          if (/^[1-6]$/.test(note)) { // только допустимые струны
            playString(note);
          }
          i++;
          setTimeout(step, speed);
        }
        step();
      });
    }

    // Ввод последовательности пользователем
    function askSequence() {
      const input = prompt("Введи последовательность струн (например: 65432123456):");
      if (!input) return;
      playMelody(input, 250); // скорость можно менять
    }

    // Кнопка запуска
    document.getElementById("playBtn").addEventListener("click", askSequence);
  </script>

</body>
</html>
