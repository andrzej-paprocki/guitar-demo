<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Pro</title>

<style>
body {
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:pink;
}

* {
  -webkit-tap-highlight-color: transparent;
}

.box {
  display:flex;
  gap:15px;
  touch-action:none;
}

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
}

.fret {
  flex:0 0 8%;
  border-bottom:1px solid rgba(0,0,0,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
}

.strum { flex:1; }
</style>
</head>

<body>

<h1>Guitar Pro</h1>
<div class="box" id="box"></div>

<script>
const box = document.getElementById("box");

// 🎧 аудио
const audios = {};
for (let s=1;s<=6;s++){
  audios[s] = new Audio(`sounds/${s}.mp3`);
  for (let f=1;f<=6;f++){
    audios[`${s}-${f}`] = new Audio(`sounds/${s}-${f}.mp3`);
  }
}

// 🎸 струны
for (let s=6;s>=1;s--){
  const stringEl = document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;

  for (let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;
    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";
  stringEl.appendChild(strum);

  box.appendChild(stringEl);
}

// 👉 активные касания
const activeTouches = new Map();

// ▶️ проигрывание
function play(key){
  const a = audios[key];
  if (!a) return;
  a.currentTime=0;
  a.play();
  return a;
}

// 🔁 смена ноты
function changeNote(id, key){
  const state = activeTouches.get(id);
  if (!state) return;

  if (state.key === key) return;

  state.key = key;
  state.audio = play(key);
}

// 🎯 определение ноты под пальцем
function getNoteFromEvent(e){
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const stringEl = el?.closest(".string");
  if (!stringEl) return null;

  const s = stringEl.dataset.string;

  if (el.classList.contains("fret")){
    return `${s}-${el.textContent}`;
  }

  return s;
}

// 🖐️ down
box.addEventListener("pointerdown", e=>{
  const key = getNoteFromEvent(e);
  if (!key) return;

  const audio = play(key);

  activeTouches.set(e.pointerId,{
    key,
    audio
  });
});

// 🖐️ move (🔥 самое важное)
document.addEventListener("pointermove", e=>{
  if (!activeTouches.has(e.pointerId)) return;

  const key = getNoteFromEvent(e);
  if (!key) return;

  changeNote(e.pointerId, key);
});

// 🖐️ up
document.addEventListener("pointerup", e=>{
  activeTouches.delete(e.pointerId);
});
</script>

</body>
</html>
