<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>
<style>
html, body {
  margin:0; padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* { user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }

h1 { margin:10px; }

.box { display:flex; gap:15px; }

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
}

.fret { flex:0 0 8%; border-bottom:1px solid rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; }
.fret.active, .fret.chord-active { background:orange; }

.strum { flex:1; background:rgba(0,0,0,0.05); }
.strum.active { background:orange; }

.chords {
  display:grid; grid-template-columns:repeat(4,90px); gap:10px; margin:15px 10px;
}
.chords button { height:50px; border:2px solid black; cursor:pointer; }
.chords button.active { background:orange; }

.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
input { padding:6px; width:260px; font-size:14px; }
button { padding:6px 12px; font-size:14px; cursor:pointer; }
</style>
</head>
<body>

<h1>Guitar 9</h1>

<div class="melody">
  <input id="melodyInput" placeholder="6/3 5/2 d:6-1@200$Am">
  <button id="playBtn">Играть</button>
</div>

<div class="box" id="box"></div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx = null; 
const audioBuffers = {};
const heldFrets = {};
let currentChord = null;
let pointerDown = false;
const touchedStrings = new Set();

const chords = {
  "Am": {2:1,3:2,4:2},
  "Em": {5:2,4:2},
  "C": {2:1,4:2,5:3},
  "G": {1:3,6:3,5:2},
  "Dm": {1:1,2:3,3:2},
  "E": {3:1,4:2,5:2},
  "A": {2:2,3:2,4:2},
  "D": {1:2,2:3,3:2}
};

const SOUND_FILES = {
  "1":"sounds/1.mp3","2":"sounds/2.mp3","3":"sounds/3.mp3",
  "4":"sounds/4.mp3","5":"sounds/5.mp3","6":"sounds/6.mp3",
  "1-1":"sounds/1-1.mp3","1-2":"sounds/1-2.mp3","1-3":"sounds/1-3.mp3",
  "1-4":"sounds/1-4.mp3","1-5":"sounds/1-5.mp3","1-6":"sounds/1-6.mp3",
  "2-1":"sounds/2-1.mp3","2-2":"sounds/2-2.mp3","2-3":"sounds/2-3.mp3",
  "2-4":"sounds/2-4.mp3","2-5":"sounds/2-5.mp3","2-6":"sounds/2-6.mp3",
  "3-1":"sounds/3-1.mp3","3-2":"sounds/3-2.mp3","3-3":"sounds/3-3.mp3",
  "3-4":"sounds/3-4.mp3","3-5":"sounds/3-5.mp3","3-6":"sounds/3-6.mp3",
  "4-1":"sounds/4-1.mp3","4-2":"sounds/4-2.mp3","4-3":"sounds/4-3.mp3",
  "4-4":"sounds/4-4.mp3","4-5":"sounds/4-5.mp3","4-6":"sounds/4-6.mp3",
  "5-1":"sounds/5-1.mp3","5-2":"sounds/5-2.mp3","5-3":"sounds/5-3.mp3",
  "5-4":"sounds/5-4.mp3","5-5":"sounds/5-5.mp3","5-6":"sounds/5-6.mp3",
  "6-1":"sounds/6-1.mp3","6-2":"sounds/6-2.mp3","6-3":"sounds/6-3.mp3",
  "6-4":"sounds/6-4.mp3","6-5":"sounds/6-5.mp3","6-6":"sounds/6-6.mp3"
};

function unlockAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
}

function playSound(key){
  if(!audioCtx) unlockAudio();
  if(!audioBuffers[key]) {
    fetch(SOUND_FILES[key])
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{ audioBuffers[key]=decoded; playSound(key); });
    return;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

const box = document.getElementById("box");
for(let s=6;s>=1;s--){
  const stringEl=document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;
  for(let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;
    fret.dataset.string=s;
    fret.dataset.fret=f;

    fret.addEventListener("pointerdown",e=>{
      e.stopPropagation();
      unlockAudio();
      heldFrets[s]=f;
      fret.classList.add("active");
    });
    const release=()=>{ delete heldFrets[s]; fret.classList.remove("active"); };
    fret.addEventListener("pointerup",release);
    fret.addEventListener("pointerleave",release);
    fret.addEventListener("pointercancel",release);
    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";
  strum.dataset.string=s;
  stringEl.appendChild(strum);
  box.appendChild(stringEl);
}

// Получаем позиции струн для свайпа
function getStringPositions(){
  return Array.from(document.querySelectorAll(".string")).map(el=>{
    const rect=el.getBoundingClientRect();
    return { s: el.dataset.string, top: rect.top, bottom: rect.bottom, mid: (rect.top+rect.bottom)/2 };
  });
}

function getNearestString(y){
  let positions = getStringPositions();
  let nearest = null;
  let minDist = Infinity;
  positions.forEach(p=>{
    const dist = Math.abs(y - p.mid);
    if(dist < minDist){
      minDist = dist;
      nearest = p.s;
    }
  });
  return nearest;
}

function playNote(s,f,chordName){
  let key=String(s);
  if(f!=null) key=`${s}-${f}`;
  else if(chordName && chords[chordName]?.[s]) key=`${s}-${chords[chordName][s]}`;
  playSound(key);

  const strumEl=document.querySelector(`[data-string="${s}"] .strum`);
  strumEl?.classList.add("active");
  setTimeout(()=>strumEl?.classList.remove("active"),100);

  if(f!=null){
    const fretEl=document.querySelector(`.fret[data-string="${s}"][data-fret="${f}"]`);
    fretEl?.classList.add("active");
  }
}

function playString(s){
  let f=null;
  if(heldFrets[s]!=null) f=heldFrets[s];
  else if(currentChord && chords[currentChord]?.[s]) f=chords[currentChord][s];
  playNote(s,f,null);
}

function handleStrum(e){
  const s = getNearestString(e.clientY);
  if(!s || touchedStrings.has(s)) return;
  touchedStrings.add(s);
  playString(s);
}

document.addEventListener("pointermove",e=>{ if(pointerDown){ e.preventDefault(); handleStrum(e); } },{passive:false});
document.addEventListener("pointerup",()=>{ pointerDown=false; touchedStrings.clear(); });
document.querySelectorAll(".strum").forEach(strum=>{
  strum.addEventListener("pointerdown",e=>{
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  });
});

// Chords
const buttons=document.querySelectorAll(".chords button");
buttons.forEach(btn=>{
  btn.addEventListener("pointerdown",e=>{
    e.preventDefault();
    unlockAudio();
    pointerDown=false;
    touchedStrings.clear();

    const name=btn.dataset.chord;
    document.querySelectorAll(".fret").forEach(f=>f.classList.remove("chord-active","active"));
    buttons.forEach(b=>b.classList.remove("active"));
    for(let k in heldFrets) delete heldFrets[k];

    currentChord=name;
    btn.classList.add("active");
    for(let s in chords[name]){
      heldFrets[s]=chords[name][s];
      const el=document.querySelector(`.fret[data-string="${s}"][data-fret="${chords[name][s]}"]`);
      el?.classList.add("chord-active");
    }
  });
});

// Melody
function playMelody(text){
  buttons.forEach(b=>b.classList.remove("active"));
  currentChord=null;
  for(let k in heldFrets) delete heldFrets[k];

  const tokens=text.trim().split(/\s+/);
  let i=0;

  function step(){
    if(i>=tokens.length) return;
    const t=tokens[i];
    if(t.startsWith("d")||t.startsWith("u")){
      const dir=t[0];
      const range=t.match(/:(\d+)-(\d+)/);
      const speed=t.match(/@(\d+)/);
      const chord=t.match(/\$(\w+)/);
      let s1=1,s2=6,sp=80,ch=null;
      if(range){ s1=+range[1]; s2=+range[2]; }
      if(speed) sp=+speed[1];
      if(chord) ch=chord[1];
      strum(dir,s1,s2,sp,ch);
      i++;
      setTimeout(step,sp*Math.abs(s2-s1+1));
      return;
    }
    if(t.includes("/")){
      const [s,f]=t.split("/");
      playNote(+s,+f,null);
    } else if(/^[1-6]$/.test(t)) playString(+t);
    i++;
    setTimeout(step,250);
  }
  step();
}

function strum(dir,s1,s2,sp,ch){
  let arr=[]; 
  if(s1<=s2){ for(let i=s1;i<=s2;i++) arr.push(i); }
  else{ for(let i=s1;i>=s2;i--) arr.push(i); }
  if(dir==="d") arr.reverse();
  arr.forEach((s,i)=>setTimeout(()=>playNote(s,null,ch),i*sp));
}

document.getElementById("playBtn").onclick=()=>playMelody(document.getElementById("melodyInput").value);

document.addEventListener("contextmenu",e=>e.preventDefault());
</script>
</body>
</html>
