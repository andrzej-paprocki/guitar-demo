<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m.Guitar</title>

<style>

html {
 background: grey;
}

body {
  touch-action:none;
  background: rgb(48,56,65);
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  overscroll-behavior:none;
}

html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
}

* {
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

h1 { 
  margin:10px; 
  color: whitesmoke;
}

button {
    font-size: 16px;
}

/* === WELCOME === */
#welcome {
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* === LAYOUT === */
.wrapper {
  display:flex;
  gap:10px;
  height:calc(100dvh - 220px);
}

/* === BARRE === */
.barreColumn {
  display:flex;
  flex-direction:column;
  width:55px;
  height: 80%;
  margin-left: 10px;
}

.barre {
  border-radius: 70px 0px 0px 70px;
  flex:0 0 50px;
  width: 100%;
  border-bottom:1px solid black;
  background:whitesmoke;
  display:flex;
  align-items:center;
  justify-content:center;
  color: lightgrey;
}

.barre.active {
  background:orange;
}

/* === STRINGS === */
.box {
  display:flex;
  gap:0px;
  align-items:stretch; 
  height:80%;
  width: 400px;
}

.string {
  display:flex;
  flex-direction:column;
  width:54px;
  height:calc(100dvh - 220px);
  position:relative;
}

.string::after {
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:3px;
  background:grey;
  transform:translateX(-50%);
  opacity:0.6;
}

/* vibration */
.string.vibrate::after {
  animation:vibe 0.15s linear;
}

@keyframes vibe {
  0% { transform:translateX(-50%) }
  25% { transform:translateX(-48%) }
  50% { transform:translateX(-52%) }
  75% { transform:translateX(-49%) }
  100% { transform:translateX(-50%) }
}

/* frets */
.fret {
  flex:0 0 50px;
  border-bottom:1px solid rgba(0,0,0,0.2);
  border-radius: 50px;
  background:grey;
  z-index: 2;
  color: white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.fret.active { background:orange; }
.fret.chord-active { background:#ffcc66; }

/* strum */
.strum {
  display:flex;
  flex-direction:column;
  width:54px;
  height:60vh;
  z-index: 2;
}

.strum.active { background:orange; }

.string.active-string::after {
  background: orange;
}

/* chords */
.chords {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:10px;
  margin:15px;
  height: 120px;
}

.chords button.active {
  background:orange;
}

/* === MELODY === */
.melody {
  margin:10px;
  display:flex;
  gap:5px;
}

#melodyInput {
  margin-left: 60px;
  width: 245px;
  height: 30px;
  background: whitesmoke;
  padding-left: 5px;
}

input::placeholder {
  color: lightgrey;
}

#playBtn {
  width: 60px;
  height: 36px;
  border-radius: 50px;
  outline: none;
  border: none;
}

</style>
</head>

<body>

<h1>m.Guitar 03-10 test</h1>

<div class="melody">
  <input id="melodyInput" placeholder="6/3 - 5/2 - - d:6-1@200$Am">
  <button id="playBtn">Play</button>
</div>

<div class="wrapper">
  <div class="box" id="box">
    <div class="barreColumn" id="barreColumn"></div>
  </div>
</div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx=null;
const audioBuffers={};
const heldFrets={};
let barreFret=null;
let currentChord=null;
let pointerDown=false;
const touchedStrings=new Set();

/* AUDIO */
function unlockAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
}

function playSound(key){
  if(!audioCtx) return;

  if(!audioBuffers[key]){
    fetch(`sounds/${key}.mp3`)
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{
        audioBuffers[key]=decoded;
        playSound(key);
      });
    return;
  }

  const src=audioCtx.createBufferSource();
  src.buffer=audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

/* BARRE BUILD */
const barreColumn=document.getElementById("barreColumn");

for(let f=1;f<=6;f++){
  const b=document.createElement("div");
  b.className="barre";
  b.dataset.fret=f;
  b.textContent=f;

  b.addEventListener("pointerdown",e=>{
    unlockAudio();
    barreFret=f;
    updateBarreUI();
  });

  b.addEventListener("pointermove",e=>{
    if(e.pressure===0) return;
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(!el || !el.classList.contains("barre")) return;

    const newF=+el.dataset.fret;
    if(barreFret===newF) return;

    barreFret=newF;
    updateBarreUI();
  });

  b.addEventListener("pointerup",releaseBarre);
  b.addEventListener("pointerleave",releaseBarre);
  b.addEventListener("pointercancel",releaseBarre);

  barreColumn.appendChild(b);
}

function updateBarreUI(){
  document.querySelectorAll(".barre").forEach(b=>b.classList.remove("active"));
  if(barreFret){
    document.querySelector(`.barre[data-fret="${barreFret}"]`)
      ?.classList.add("active");
  }
}

function releaseBarre(){
  barreFret=null;
  updateBarreUI();
}

/* BUILD STRINGS */
const box=document.getElementById("box");

for(let s=6;s>=1;s--){
  const stringEl=document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;

  for(let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;
    fret.dataset.string=s;
    fret.dataset.fret=f;

    fret.addEventListener("pointerdown",e=>{
      e.stopPropagation();
      unlockAudio();
      heldFrets[s]=f;
      clearFrets(s);
      fret.classList.add("active");
    });

    fret.addEventListener("pointermove",e=>{
      if(e.pressure===0) return;

      const el=document.elementFromPoint(e.clientX,e.clientY);
      if(!el || !el.classList.contains("fret")) return;
      if(el.dataset.string!==String(s)) return;

      const newF=+el.dataset.fret;
      if(heldFrets[s]===newF) return;

      heldFrets[s]=newF;
      clearFrets(s);
      el.classList.add("active");
    });

    const release=()=>{
      delete heldFrets[s];
      clearFrets(s);
    };

    fret.addEventListener("pointerup",release);
    fret.addEventListener("pointerleave",release);
    fret.addEventListener("pointercancel",release);

    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";
  strum.dataset.string=s;

  strum.addEventListener("pointerdown",e=>{
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  });

  stringEl.appendChild(strum);
  box.appendChild(stringEl);
}

/* HELPERS */
function clearFrets(s){
  document.querySelectorAll(`.fret[data-string="${s}"]`)
    .forEach(el=>el.classList.remove("active"));
}

/* PLAY */
function playNote(s,f){
  const key=f?`${s}-${f}`:String(s);
  playSound(key);

  const stringEl=document.querySelector(`.string[data-string="${s}"]`);
              stringEl.classList.add("active-string");
              setTimeout(()=>stringEl.classList.remove("active-string"),150);

  stringEl.classList.add("vibrate");
  setTimeout(()=>stringEl.classList.remove("vibrate"),150);

  // const strumEl=stringEl.querySelector(".strum");
  // strumEl.classList.add("active");
  // setTimeout(()=>strumEl.classList.remove("active"),150);



  if(f){
    const fretEl=document.querySelector(`.fret[data-string="${s}"][data-fret="${f}"]`);
    fretEl.classList.add("active");
    setTimeout(()=>{
      if(!heldFrets[s]) fretEl.classList.remove("active");
    },150);
  }
}

function playString(s){
  let f=null;

  if(barreFret) f=barreFret;
  else if(heldFrets[s]!=null) f=heldFrets[s];
  else if(currentChord && chords[currentChord]?.[s]) f=chords[currentChord][s];

  playNote(s,f);
}

/* STRUM */
function handleStrum(e){
  // Берёт элемент под пальцем
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if(!el) return;

  // Поднимается вверх до струны
  const stringEl = el.closest(".string");
  if(!stringEl) return;

  // Определяет номер струны
  const s = stringEl.dataset.string;
  if(touchedStrings.has(s)) return;

  // Проверяет, не сыграли ли уже эту струну в этом свайпе
  touchedStrings.add(s);
  // И играет звук
  playString(s);
}


// Запуск свайпа (старт касания)
document.addEventListener("pointerdown", e=>{
  unlockAudio();
  pointerDown = true;
  touchedStrings.clear();
  handleStrum(e);
});

// Продолжение свайпа (движение пальца)
document.addEventListener("pointermove",e=>{
  if(pointerDown){
    e.preventDefault();
    handleStrum(e);
  }
},{passive:false});

// Завершение свайпа
document.addEventListener("pointerup",()=>{
  pointerDown=false;
  touchedStrings.clear();
});

/* CHORDS */
const chords={
  "Am":{2:1,3:2,4:2},
  "Em":{5:2,4:2},
  "C":{2:1,4:2,5:3},
  "G":{1:3,6:3,5:2},
  "Dm":{1:1,2:3,3:2},
  "E":{3:1,4:2,5:2},
  "A":{2:2,3:2,4:2},
  "D":{1:2,2:3,3:2}
};

const buttons=document.querySelectorAll(".chords button");

buttons.forEach(btn=>{
  btn.addEventListener("pointerdown",e=>{
    e.preventDefault();
    unlockAudio();

    const name=btn.dataset.chord;

    if(currentChord===name){
      currentChord=null;
      btn.classList.remove("active");
      document.querySelectorAll(".fret")
        .forEach(f=>f.classList.remove("chord-active"));
      return;
    }

    buttons.forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".fret")
      .forEach(f=>f.classList.remove("chord-active"));

    currentChord=name;
    btn.classList.add("active");

    for(let s in chords[name]){
      const f=chords[name][s];
      const el=document.querySelector(`.fret[data-string="${s}"][data-fret="${f}"]`);
      el.classList.add("chord-active");
    }
  });




  // Мелодия
  document.getElementById("playBtn").onclick = () => {
    const text = document.getElementById("melodyInput").value.trim();
    if(!text) return;

    buttons.forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".fret").forEach(f=>f.classList.remove("chord-active","active"));
    currentChord=null;
    for(let k in heldFrets) delete heldFrets[k];

    playMelody(text);
  };

  function playMelody(text){
    const tokens=text.trim().split(/\s+/);
    let i=0;

    function step(){
      if(i>=tokens.length) return;
      const t=tokens[i];

      if(t.startsWith("d")||t.startsWith("u")){
        const dir=t[0];
        const range=t.match(/:(\d+)-(\d+)/);
        const speed=t.match(/@(\d+)/);
        const chord=t.match(/\$(\w+)/);
        let s1=null, s2=null, sp=80, ch=null;
        if(range){ s1=+range[1]; s2=+range[2]; }
        if(speed) sp=+speed[1];
        if(chord) ch=chord[1];
        if(s1===null || s2===null){
          if(dir==="d"){ s1=6; s2=1; } else { s1=1; s2=6; }
        }
        strum(s1,s2,sp,ch);
        i++;
        setTimeout(step, sp*Math.abs(s2-s1)+sp);
        return;
      }

      if(t.includes("/")){
        const [s,f]=t.split("/");
        playNote(+s,+f,null);
      } else if(/^[1-6]$/.test(t)) playString(+t);

      i++;
      setTimeout(step,250);
    }
    step();
  }

  function strum(s1,s2,sp,ch){
    let step = s1<=s2?1:-1;
    for(let s=s1,i=0; step>0 ? s<=s2 : s>=s2; s+=step,i++){
      setTimeout(()=>{
        let fret=null;
        if(ch && chords[ch]?.[s]) fret=chords[ch][s];
        playNote(s,fret,ch);
      }, i*sp);
    }
  }

  document.addEventListener("contextmenu",e=>e.preventDefault());
});
</script>

</body>
</html>
