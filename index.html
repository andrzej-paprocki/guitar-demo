<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>
<style>
html, body {
  margin:0; padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* { user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }

h1 { margin:10px; }

.box { display:flex; gap:15px; }

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
}

.fret { flex:0 0 8%; border-bottom:1px solid rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; }
.fret.active, .fret.chord-active { background:orange; }

.strum { flex:1; background:rgba(0,0,0,0.05); }
.strum.active { background:orange; }

.chords {
  display:grid; grid-template-columns:repeat(4,90px); gap:10px; margin:15px 10px;
}
.chords button { height:50px; border:2px solid black; cursor:pointer; }
.chords button.active { background:orange; }

.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
input { padding:6px; width:260px; font-size:14px; }
button { padding:6px 12px; font-size:14px; cursor:pointer; }
</style>
</head>
<body>

<h1>Guitar 10.23</h1>

<div class="melody">
  <input id="melodyInput" placeholder="6/3 5/2 d:6-1@200$Am">
  <button id="playBtn">Играть</button>
</div>

<!-- Здесь будут визуальные струны -->
<div class="box" id="box"></div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx = null;
const audioBuffers = {};
const heldFrets = {};
let currentChord = null;
let pointerDown = false;
const touchedStrings = new Set();
let activeFinger = {string:null, fret:null};

const chords = {
  "Am": {2:1,3:2,4:2},
  "Em": {5:2,4:2},
  "C": {2:1,4:2,5:3},
  "G": {1:3,6:3,5:2},
  "Dm": {1:1,2:3,3:2},
  "E": {3:1,4:2,5:2},
  "A": {2:2,3:2,4:2},
  "D": {1:2,2:3,3:2}
};

const SOUND_FILES = {};
for(let s=1;s<=6;s++){
  SOUND_FILES[s] = `sounds/${s}.mp3`;
  for(let f=1;f<=6;f++) SOUND_FILES[`${s}-${f}`]=`sounds/${s}-${f}.mp3`;
}

function unlockAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
}

function playSound(key){
  if(!audioCtx) unlockAudio();
  if(!audioBuffers[key]) {
    fetch(SOUND_FILES[key])
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{ audioBuffers[key]=decoded; playSound(key); })
      .catch(err=>console.error("Audio error:", key, err));
    return;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

const box = document.getElementById("box");

function getStringFromX(x){
  const strings = [...document.querySelectorAll(".string")];
  let closest = null;
  let minDist = Infinity;
  strings.forEach(str=>{
    const rect = str.getBoundingClientRect();
    const center = rect.left + rect.width/2;
    const dist = Math.abs(x - center);
    if(dist < minDist){
      minDist = dist;
      closest = str;
    }
  });
  return closest?.dataset.string;
}

// Создание струн и ладов
for(let s=6;s>=1;s--){
  const stringEl=document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;

  for(let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;
    fret.dataset.string=s;
    fret.dataset.fret=f;

    // Начало удерживания и скольжения
    fret.addEventListener("pointerdown", e=>{
      e.stopPropagation();
      unlockAudio();
      pointerDown=true;
      activeFinger = {string:s, fret:f};
      heldFrets[s] = f;
      fret.classList.add("active");
      playSound(`${s}-${f}`);
    });

    fret.addEventListener("pointermove", e=>{
      if(!pointerDown) return;
      const sStr = fret.dataset.string;
      const fCurrent = heldFrets[sStr];
      const fNew = +fret.dataset.fret;
      if(activeFinger.string===sStr && fCurrent !== fNew){
        const prevFret = document.querySelector(`.fret[data-string="${sStr}"][data-fret="${fCurrent}"]`);
        prevFret?.classList.remove("active");
        heldFrets[sStr] = fNew;
        fret.classList.add("active");
        playSound(`${sStr}-${fNew}`);
        activeFinger.fret=fNew;
      }
    });

    const release=()=>{ 
      if(activeFinger.string==s && activeFinger.fret==f){
        activeFinger={string:null,fret:null};
      }
      pointerDown=false;
    };
    fret.addEventListener("pointerup",release);
    fret.addEventListener("pointerleave",release);
    fret.addEventListener("pointercancel",release);

    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";
  strum.dataset.string=s;

  strum.addEventListener("pointerdown",e=>{
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  });

  stringEl.appendChild(strum);
  box.appendChild(stringEl);
});

// Воспроизведение ноты
function playNote(s,f,chordName){
  let key=String(s);
  if(f!=null) key=`${s}-${f}`;
  else if(chordName && chords[chordName]?.[s]) key=`${s}-${chordName[s]}`;
  playSound(key);

  const strumEl=document.querySelector(`.string[data-string="${s}"] .strum`);
  if(strumEl){
    strumEl.classList.add("active");
    setTimeout(()=>strumEl?.classList.remove("active"),150);
  }

  if(f!=null){
    const fretEl=document.querySelector(`.fret[data-string="${s}"][data-fret="${f}"]`);
    if(fretEl) fretEl.classList.add("active");
    setTimeout(()=>{
      if(!heldFrets[s]) fretEl.classList.remove("active");
    }, 150);
  }
}

// Воспроизведение струны
function playString(s){
  let f=null;
  if(heldFrets[s]!=null) f=heldFrets[s];
  else if(currentChord && chords[currentChord]?.[s]) f=chords[currentChord][s];
  playNote(s,f,null);
}

// Свайп
function handleStrum(e){
  let s=null;
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(el && el.classList.contains("strum")) s=el.dataset.string;
  else s = getStringFromX(e.clientX);
  if(!s || touchedStrings.has(s)) return;

  touchedStrings.add(s);
  playString(s);
}

document.addEventListener("pointermove",e=>{
  if(pointerDown){ e.preventDefault(); handleStrum(e); }
},{passive:false});

document.addEventListener("pointerup",()=>{
  pointerDown=false;
  touchedStrings.clear();
  activeFinger={string:null,fret:null};
});

// Остальной код: аккорды, мелодия и strum() остается без изменений
// ...
</script>
</body>
</html>
