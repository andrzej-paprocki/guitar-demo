<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>
<style>
html, body {
  margin:0; padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* { user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }

h1 { margin:10px; }

.box { display:flex; gap:15px; }

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
}

.fret {
  flex:0 0 8%;
  border-bottom:1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}

.fret.active, .fret.chord-active { background:orange; }

.strum { flex:1; background:rgba(0,0,0,0.05); }
.strum.active { background:orange; }

.chords {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:10px;
  margin:15px 10px;
}
.chords button { height:50px; border:2px solid black; cursor:pointer; }
.chords button.active { background:orange; }

.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
input { padding:6px; width:260px; font-size:14px; }
button { padding:6px 12px; font-size:14px; cursor:pointer; }

#welcome {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
</style>
</head>

<body>

<div id="welcome">
  <img src="img/guitar.png">
  <h2>Guitar Universal Audio</h2>
  <button id="okBtn">OK</button>
</div>

<h1>Guitar 10</h1>

<div class="melody">
  <input id="melodyInput">
  <button id="playBtn">Играть</button>
</div>

<div class="box" id="box" style="display:none;"></div>

<div class="chords" style="display:none;">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx=null;
const audioBuffers={};
const heldFrets={};
let currentChord=null;
let pointerDown=false;
const touchedStrings=new Set();

const chords={
  "Am":{2:1,3:2,4:2},
  "Em":{5:2,4:2},
  "C":{2:1,4:2,5:3},
  "G":{1:3,6:3,5:2},
  "Dm":{1:1,2:3,3:2},
  "E":{3:1,4:2,5:2},
  "A":{2:2,3:2,4:2},
  "D":{1:2,2:3,3:2}
};

const SOUND_FILES={};
for(let s=1;s<=6;s++){
  SOUND_FILES[s]=`sounds/${s}.mp3`;
  for(let f=1;f<=6;f++) SOUND_FILES[`${s}-${f}`]=`sounds/${s}-${f}.mp3`;
}

function unlockAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
}

function playSound(key){
  if(!audioCtx) return;

  if(!audioBuffers[key]){
    fetch(SOUND_FILES[key])
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(d=>{audioBuffers[key]=d; playSound(key);});
    return;
  }

  const src=audioCtx.createBufferSource();
  src.buffer=audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

function initGuitar(){
  const box=document.getElementById("box");
  const chordsDiv=document.querySelector(".chords");
  box.style.display="flex";
  chordsDiv.style.display="grid";

  for(let s=6;s>=1;s--){
    const stringEl=document.createElement("div");
    stringEl.className="string";
    stringEl.dataset.string=s;

    for(let f=1;f<=6;f++){
      const fret=document.createElement("div");
      fret.className="fret";
      fret.textContent=f;
      fret.dataset.string=s;
      fret.dataset.fret=f;

      fret.addEventListener("pointerdown",e=>{
        e.stopPropagation();
        heldFrets[s]=f;
        fret.classList.add("active");
      });

      // 🔥 ВСТРОЕННЫЙ SWIPE
      fret.addEventListener("pointermove",e=>{
        if(e.pressure===0) return;

        const el=document.elementFromPoint(e.clientX,e.clientY);
        const newFret=el?.closest(".fret");
        if(!newFret) return;
        if(newFret.dataset.string!==String(s)) return;

        const newF=+newFret.dataset.fret;
        if(heldFrets[s]===newF) return;

        heldFrets[s]=newF;

        document.querySelectorAll(`.fret[data-string="${s}"]`)
          .forEach(f=>f.classList.remove("active"));

        newFret.classList.add("active");
      });

      stringEl.appendChild(fret);
    }

    const strum=document.createElement("div");
    strum.className="strum";
    strum.dataset.string=s;

    stringEl.appendChild(strum);
    box.appendChild(stringEl);
  }
}

document.getElementById("okBtn").onclick=()=>{
  document.getElementById("welcome").style.display="none";
  initGuitar();
};
</script>

</body>
</html>
