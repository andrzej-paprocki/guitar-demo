<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>

<style>
html, body {
  margin:0; padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* {
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

h1 { margin:10px; }

/* === WELCOME === */
#welcome {
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#welcome button {
  margin-top:20px;
  font-size:20px;
  padding:10px 20px;
}

/* === STRINGS === */
.box { display:flex; gap:15px; }

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
  position:relative;
}

.string::after {
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:2px;
  background:black;
  transform:translateX(-50%);
  opacity:0.6;
}

.fret {
  flex:0 0 8%;
  border-bottom:1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}

.fret.active { background:orange; }
.fret.chord-active { background:#ffcc66; }

.strum {
  flex:1;
  background:rgba(0,0,0,0.05);
}
.strum.active { background:orange; }

/* === CHORDS === */
.chords {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:10px;
  margin:15px 10px;
}

.chords button.active { background:orange; }

/* === MELODY === */
.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
</style>
</head>

<body>

<div id="welcome">
  <h1>🎸 Guitar Universal</h1>
  <button id="startBtn">OK</button>
</div>

<h1>Guitar 10.19</h1>

<div class="melody">
  <input id="melodyInput" placeholder="6/3 5/2 d:6-1@200$Am">
  <button id="playBtn">Играть</button>
</div>

<div class="box" id="box"></div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx=null;
const audioBuffers={};
const heldFrets={};
let currentChord=null;
let pointerDown=false;
const touchedStrings=new Set();

/* AUDIO */
function unlockAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
}

function playSound(key){
  if(!audioCtx) return;

  if(!audioBuffers[key]){
    fetch(`sounds/${key}.mp3`)
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{
        audioBuffers[key]=decoded;
        playSound(key);
      });
    return;
  }

  const src=audioCtx.createBufferSource();
  src.buffer=audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

/* WELCOME */
document.getElementById("startBtn").onclick=()=>{
  unlockAudio();
  audioCtx.resume();

  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  gain.gain.value=0;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime+0.01);

  document.getElementById("welcome").style.display="none";
};

/* BUILD */
const box=document.getElementById("box");

for(let s=6;s>=1;s--){
  const stringEl=document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;

  for(let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;
    fret.dataset.string=s;
    fret.dataset.fret=f;

    fret.addEventListener("pointerdown",e=>{
      e.stopPropagation();
      unlockAudio();

      heldFrets[s]=f;

      clearFrets(s);
      fret.classList.add("active");
    });

    fret.addEventListener("pointermove",e=>{
      if(e.pressure===0) return;

      const el=document.elementFromPoint(e.clientX,e.clientY);
      if(!el || !el.classList.contains("fret")) return;
      if(el.dataset.string!==String(s)) return;

      const newF=+el.dataset.fret;
      if(heldFrets[s]===newF) return;

      heldFrets[s]=newF;
      clearFrets(s);
      el.classList.add("active");
    });

    fret.addEventListener("pointerup",()=>releaseFret(s));
    fret.addEventListener("pointercancel",()=>releaseFret(s));
    fret.addEventListener("pointerleave",()=>releaseFret(s));

    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";
  strum.dataset.string=s;

  strum.addEventListener("pointerdown",e=>{
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  });

  stringEl.appendChild(strum);
  box.appendChild(stringEl);
}

/* HELPERS */
function clearFrets(s){
  document.querySelectorAll(`.fret[data-string="${s}"]`)
    .forEach(el=>el.classList.remove("active"));
}

function releaseFret(s){
  delete heldFrets[s];
  clearFrets(s);
}

/* PLAY */
function playNote(s,f){
  const key=f?`${s}-${f}`:String(s);
  playSound(key);

  const strumEl=document.querySelector(`.string[data-string="${s}"] .strum`);
  strumEl.classList.add("active");
  setTimeout(()=>strumEl.classList.remove("active"),150);
}

function playString(s){
  let f=null;
  if(heldFrets[s]!=null) f=heldFrets[s];
  else if(currentChord && chords[currentChord]?.[s]) f=chords[currentChord][s];
  playNote(s,f);
}

/* STRUM */
function handleStrum(e){
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(!el || !el.classList.contains("strum")) return;

  const s=el.dataset.string;
  if(touchedStrings.has(s)) return;

  touchedStrings.add(s);
  playString(s);
}

document.addEventListener("pointermove",e=>{
  if(pointerDown){
    e.preventDefault();
    handleStrum(e);
  }
},{passive:false});

document.addEventListener("pointerup",()=>{
  pointerDown=false;
  touchedStrings.clear();
});

/* SWIPE OUTSIDE */
document.addEventListener("pointerdown",e=>{
  if(e.target.closest("input, button")) return;

  const rect=box.getBoundingClientRect();
  const margin=80;

  if(
    e.clientX>=rect.left-margin &&
    e.clientX<=rect.right+margin &&
    e.clientY>=rect.top &&
    e.clientY<=rect.bottom
  ){
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  }
});

/* CHORDS */
const chords={
  "Am":{2:1,3:2,4:2},
  "Em":{5:2,4:2},
  "C":{2:1,4:2,5:3},
  "G":{1:3,6:3,5:2},
  "Dm":{1:1,2:3,3:2},
  "E":{3:1,4:2,5:2},
  "A":{2:2,3:2,4:2},
  "D":{1:2,2:3,3:2}
};

const buttons=document.querySelectorAll(".chords button");

buttons.forEach(btn=>{
  btn.addEventListener("pointerdown",e=>{
    e.preventDefault();
    unlockAudio();

    buttons.forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".fret")
      .forEach(f=>f.classList.remove("chord-active","active"));

    const name=btn.dataset.chord;

    if(currentChord===name){
      currentChord=null;
      return;
    }

    currentChord=name;
    btn.classList.add("active");

    for(let s in chords[name]){
      const f=chords[name][s];
      heldFrets[s]=f;

      const el=document.querySelector(`.fret[data-string="${s}"][data-fret="${f}"]`);
      el.classList.add("chord-active");
    }
  });
});

/* === MELODY BACK === */
document.getElementById("playBtn").onclick=()=>{
  const text=document.getElementById("melodyInput").value.trim();
  if(!text) return;

  currentChord=null;
  buttons.forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".fret")
    .forEach(f=>f.classList.remove("chord-active","active"));
  for(let k in heldFrets) delete heldFrets[k];

  playMelody(text);
};

function playMelody(text){
  const tokens=text.split(/\s+/);
  let i=0;

  function step(){
    if(i>=tokens.length) return;
    const t=tokens[i];

    if(t.includes("/")){
      const [s,f]=t.split("/");
      playNote(+s,+f);
      i++;
      setTimeout(step,250);
      return;
    }

    if(/^[1-6]$/.test(t)){
      playString(+t);
      i++;
      setTimeout(step,250);
      return;
    }

    i++;
    step();
  }

  step();
}
</script>

</body>
</html>
