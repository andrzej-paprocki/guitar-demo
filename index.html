<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>
<style>
html, body {
  margin:0; padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* { user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }

h1 { margin:10px; }

/* === WELCOME === */
#welcome {
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* === STRINGS === */
.box { display:flex; gap:15px; }

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
  position:relative;
}
.string::after {
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:2px;
  background:black;
  transform:translateX(-50%);
  opacity:0.6;
}
.string.vibrate::after {
  animation:vibe 0.15s linear;
}
@keyframes vibe {
  0% { transform:translateX(-50%) translateX(0); }
  25% { transform:translateX(-50%) translateX(2px); }
  50% { transform:translateX(-50%) translateX(-2px); }
  75% { transform:translateX(-50%) translateX(1px); }
  100% { transform:translateX(-50%) translateX(0); }
}

/* === FRETS === */
.fret {
  flex:0 0 8%;
  border-bottom:1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}
.fret.active { background:orange; }
.fret.chord-active { background:#ffcc66; }

/* === STRUM === */
.strum {
  flex:1;
  background:rgba(0,0,0,0.05);
}
.strum.active { background:orange; }

/* === CHORDS === */
.chords {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:10px;
  margin:15px;
}
.chords button.active { background:orange; }

/* === MELODY === */
.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
input { padding:6px; width:260px; font-size:14px; }
button { padding:6px 12px; font-size:14px; cursor:pointer; }
</style>
</head>

<body>

<div id="welcome">
  <h1>🎸 Guitar Universal</h1>
  <button id="startBtn">OK</button>
</div>

<h1>Guitar 10.21</h1>

<div class="melody">
  <input id="melodyInput" placeholder="6/3 5/2 d:6-1@200$Am">
  <button id="playBtn">Играть</button>
</div>

<div class="box" id="box"></div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx = null;
const audioBuffers = {};
const heldFrets = {};
let currentChord = null;
let pointerDown = false;
const touchedStrings = new Set();

const chords = {
  "Am": {2:1,3:2,4:2},
  "Em": {5:2,4:2},
  "C": {2:1,4:2,5:3},
  "G": {1:3,6:3,5:2},
  "Dm": {1:1,2:3,3:2},
  "E": {3:1,4:2,5:2},
  "A": {2:2,3:2,4:2},
  "D": {1:2,2:3,3:2}
};

const SOUND_FILES = {};
for(let s=1;s<=6;s++){
  SOUND_FILES[s] = `sounds/${s}.mp3`;
  for(let f=1;f<=6;f++) SOUND_FILES[`${s}-${f}`]=`sounds/${s}-${f}.mp3`;
}

function unlockAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
}

function playSound(key){
  if(!audioCtx) unlockAudio();

  if(!audioBuffers[key]) {
    fetch(SOUND_FILES[key])
      .then(r=>{
        if(!r.ok) throw new Error("no file");
        return r.arrayBuffer();
      })
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{
        audioBuffers[key]=decoded;
        playSound(key);
      })
      .catch(err=>console.log("Audio error:", key));
    return;
  }

  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

function initGuitar(){
  const box = document.getElementById("box");
  const buttons=document.querySelectorAll(".chords button");

  for(let s=6;s>=1;s--){
    const stringEl=document.createElement("div");
    stringEl.className="string";
    stringEl.dataset.string=s;

    for(let f=1;f<=6;f++){
      const fret=document.createElement("div");
      fret.className="fret";
      fret.textContent=f;
      fret.dataset.string=s;
      fret.dataset.fret=f;

      fret.addEventListener("pointerdown", e=>{
        e.stopPropagation();
        unlockAudio();
        heldFrets[s]=f;
        clearFrets(s);
        fret.classList.add("active");
      });

      fret.addEventListener("pointermove", e=>{
        if(e.pressure===0) return;
        const el=document.elementFromPoint(e.clientX,e.clientY);
        const newFret = el?.closest(".fret");
        if(!newFret || newFret.dataset.string!==String(s)) return;

        const newF = +newFret.dataset.fret;
        if(heldFrets[s] === newF) return;

        heldFrets[s] = newF;
        clearFrets(s);
        newFret.classList.add("active");
      });

      const release=()=>{
        delete heldFrets[s];
        clearFrets(s);
      };

      fret.addEventListener("pointerup", release);
      fret.addEventListener("pointerleave", release);
      fret.addEventListener("pointercancel", release);

      stringEl.appendChild(fret);
    }

    const strum=document.createElement("div");
    strum.className="strum";
    strum.dataset.string=s;

    strum.addEventListener("pointerdown", e=>{
      unlockAudio();
      pointerDown=true;
      touchedStrings.clear();
      handleStrum(e);
    });

    stringEl.appendChild(strum);
    box.appendChild(stringEl);
  }

  function clearFrets(s){
    document.querySelectorAll(`.fret[data-string="${s}"]`)
      .forEach(el=>el.classList.remove("active"));
  }

  function playNote(s,f,chordName){
    let key=String(s);
    if(f!=null) key=`${s}-${f}`;
    else if(chordName && chords[chordName]?.[s])
      key=`${s}-${chords[chordName][s]}`;

    playSound(key);

    const stringEl=document.querySelector(`.string[data-string="${s}"]`);
    stringEl.classList.add("vibrate");
    setTimeout(()=>stringEl.classList.remove("vibrate"),150);
  }

  function playString(s,chordName){
    let f=null;
    if(heldFrets[s]!=null) f=heldFrets[s];
    else if(chordName && chords[chordName]?.[s])
      f=chords[chordName][s];
    playNote(s,f,chordName);
  }

  function handleStrum(e){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const stringEl = el?.closest(".string");
    if(!stringEl) return;

    const s=stringEl.dataset.string;
    if(touchedStrings.has(s)) return;

    touchedStrings.add(s);
    playString(s,currentChord);
  }

  document.addEventListener("pointermove",e=>{
    if(pointerDown){
      e.preventDefault();
      handleStrum(e);
    }
  },{passive:false});

  document.addEventListener("pointerup",()=>{
    pointerDown=false;
    touchedStrings.clear();
  });

  document.addEventListener("pointerdown", e=>{
    if(e.target.closest("input, button")) return;

    const rect=box.getBoundingClientRect();
    const m=60;

    if(e.clientX>=rect.left-m && e.clientX<=rect.right+m &&
       e.clientY>=rect.top-m && e.clientY<=rect.bottom+m){
      unlockAudio();
      pointerDown=true;
      touchedStrings.clear();
      handleStrum(e);
    }
  });

  buttons.forEach(btn=>{
    btn.addEventListener("pointerdown", e=>{
      e.preventDefault();
      unlockAudio();

      const name=btn.dataset.chord;

      if(currentChord===name){
        currentChord=null;
        btn.classList.remove("active");
        return;
      }

      buttons.forEach(b=>b.classList.remove("active"));
      currentChord=name;
      btn.classList.add("active");
    });
  });

  /* 🎵 МЕЛОДИЯ */
  document.getElementById("playBtn").onclick=()=>{
    const text=document.getElementById("melodyInput").value.trim();
    if(!text) return;
    playMelody(text);
  };

  function playMelody(text){
    const tokens=text.split(/\s+/);
    let i=0;

    function step(){
      if(i>=tokens.length) return;

      const t=tokens[i];

      if(t.startsWith("d")||t.startsWith("u")){
        const dir=t[0];
        const range=t.match(/:(\d+)-(\d+)/);
        const speed=t.match(/@(\d+)/);

        let s1=range?+range[1]:(dir==="d"?6:1);
        let s2=range?+range[2]:(dir==="d"?1:6);
        let sp=speed?+speed[1]:80;

        strum(s1,s2,sp);

        i++;
        setTimeout(step, sp*Math.abs(s2-s1)+sp);
        return;
      }

      if(t.includes("/")){
        const [s,f]=t.split("/");
        playNote(+s,+f);
      } else if(/^[1-6]$/.test(t)){
        playString(+t);
      }

      i++;
      setTimeout(step,250);
    }

    step();
  }

  function strum(s1,s2,sp){
    let step = s1<=s2?1:-1;
    for(let s=s1,i=0; step>0?s<=s2:s>=s2; s+=step,i++){
      setTimeout(()=>playString(s), i*sp);
    }
  }

  document.addEventListener("contextmenu", e=>e.preventDefault());
}

document.getElementById("startBtn").onclick=()=>{
  unlockAudio();
  audioCtx.resume();
  document.getElementById("welcome").style.display="none";
  initGuitar();
};
</script>

</body>
</html>
