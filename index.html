<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guitar Chords Extended</title>

<style>
body {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background-color: pink;
  height: 100vh;
}

.box { 
  display: flex; 
  gap: 15px; 
  touch-action: none;
}

.string {
  display: flex;
  flex-direction: column;
  width: 50px;
  height: 60vh;
  border: 2px solid black;
  background: lightgrey;
}

.fret {
  flex: 0 0 8%;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}

.fret.active { background: orange; }

.strum { flex:1; background: rgba(0,0,0,0.05); }
.strum.active { background: orange; }

/* 🎹 горизонтальные кнопки */
.chords {
  position: fixed;
  top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.chords button {
  padding: 8px 12px;
  font-size: 14px;
}

.chords button.active {
  background: orange;
}
</style>
</head>

<body>

<h1>Guitar Pro Chords</h1>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<div class="box" id="box"></div>

<script>
const box = document.getElementById("box");
let pointerDown = false;
const touched = new Set();

const heldFrets = {};
let currentChord = null;

// 🎸 аккорды
const chords = {
  "Am": {2:1, 3:2, 4:2},
  "Em": {5:2, 4:2},
  "C":  {2:1, 4:2, 5:3},
  "G":  {1:3, 6:3, 5:2},
  "Dm": {1:1, 2:3, 3:2},
  "E":  {3:1, 4:2, 5:2},
  "A":  {2:2, 3:2, 4:2},
  "D":  {1:2, 2:3, 3:2}
};

// 🎸 струны
for (let s = 6; s >= 1; s--) {
  const stringEl = document.createElement("div");
  stringEl.className = "string";
  stringEl.dataset.string = s;

for (let f = 1; f <= 6; f++) {
  const fret = document.createElement("div");
  fret.className = "fret";
  fret.textContent = f;
  fret.dataset.string = s;
  fret.dataset.fret = f;

  // 👉 РУЧНОЕ ЗАЖАТИЕ ЛАДА
  fret.addEventListener("pointerdown", e => {
    e.stopPropagation();

    // ❗ если включен аккорд — игнор
    if (currentChord) return;

    const stringNum = s.toString();
    heldFrets[stringNum] = f.toString();

    fret.classList.add("active");
  });

  const release = () => {
    if (currentChord) return;

    const stringNum = s.toString();
    delete heldFrets[stringNum];
    fret.classList.remove("active");
  };

  fret.addEventListener("pointerup", release);
  fret.addEventListener("pointerleave", release);
  fret.addEventListener("pointercancel", release);

  stringEl.appendChild(fret);
}

  const strum = document.createElement("div");
  strum.className = "strum";
  stringEl.appendChild(strum);

  box.appendChild(stringEl);
}

// 🎧 аудио
const audios = {};
for (let s = 1; s <= 6; s++) {
  audios[s] = new Audio(`sounds/${s}.mp3`);
  for (let f = 1; f <= 6; f++) {
    audios[`${s}-${f}`] = new Audio(`sounds/${s}-${f}.mp3`);
  }
}

// ▶️ звук
function playString(string) {
  let fret = heldFrets[string];
  const key = fret ? `${string}-${fret}` : string;

  const audio = audios[key];
  if (!audio) return;

  audio.currentTime = 0;
  audio.play();

  const el = document.querySelector(`[data-string="${string}"] .strum`);
  el.classList.add("active");
  setTimeout(()=>el.classList.remove("active"),100);
}

// 🖐️ свайп
function handlePointer(e){
  const el = document.elementFromPoint(e.clientX,e.clientY);
  const stringEl = el?.closest(".string");
  if (!stringEl) return;

  const s = stringEl.dataset.string;
  if (touched.has(s)) return;

  touched.add(s);
  playString(s);
}

box.addEventListener("pointerdown", e=>{
  pointerDown = true;
  touched.clear();
  handlePointer(e);
});

document.addEventListener("pointermove", e=>{
  if (!pointerDown) return;
  e.preventDefault();
  handlePointer(e);
});

document.addEventListener("pointerup", ()=>{
  pointerDown = false;
  touched.clear();
});

// 🎹 кнопки
const buttons = document.querySelectorAll(".chords button");

buttons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const chordName = btn.dataset.chord;

    if (currentChord === chordName){
      clearChord();
      currentChord = null;
      btn.classList.remove("active");
      return;
    }

    clearChord();
    currentChord = chordName;

    buttons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    const chord = chords[chordName];

    for (let string in chord){
      heldFrets[string] = chord[string];

      const el = document.querySelector(
        `.fret[data-string="${string}"][data-fret="${chord[string]}"]`
      );

      if (el) el.classList.add("active");
    }
  });
});

// очистка
function clearChord(){
  for (let key in heldFrets) delete heldFrets[key];
  document.querySelectorAll(".fret").forEach(f=>f.classList.remove("active"));
}
</script>

</body>
</html>
