<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guitar Pro FINAL</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  touch-action: none;
  overscroll-behavior: none;
  background: pink;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.box { 
  display: flex; 
  gap: 15px; 
  margin-top: 20px;
}

.string {
  display: flex;
  flex-direction: column;
  width: 50px;
  height: 60vh;
  border: 2px solid black;
  background: lightgrey;
}

.fret {
  flex: 0 0 8%;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

.fret.active { background: orange; }
.fret.chord-active { background: orange; }

.strum { flex:1; background: rgba(0,0,0,0.05); }
.strum.active { background: orange; }

.chords {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
  justify-content: center;
}

.chords button.active { background: orange; }

.melody-input {
  margin-top: 10px;
}

h1 { margin: 10px; }
</style>
</head>

<body>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<h1>Guitar Pro</h1>

<div class="box" id="box"></div>

<div class="melody-input">
  <input id="melodyInput" placeholder="1 2/3 р 3 4/2 5 6">
  <button id="playMelodyBtn">Играть</button>
</div>

<script>
const box = document.getElementById("box");
const heldFrets = {};
let pointerDown = false;
const touched = new Set();

const chords = {
  "Am": {2:1, 3:2, 4:2},
  "Em": {5:2, 4:2},
  "C":  {2:1, 4:2, 5:3},
  "G":  {1:3, 6:3, 5:2},
  "Dm": {1:1, 2:3, 3:2},
  "E":  {3:1, 4:2, 5:2},
  "A":  {2:2, 3:2, 4:2},
  "D":  {1:2, 2:3, 3:2}
};

let currentChord = null;

// создание струн
for (let s=6; s>=1; s--){
  const stringEl = document.createElement("div");
  stringEl.className = "string";
  stringEl.dataset.string = s;

  for (let f=1; f<=6; f++){
    const fret = document.createElement("div");
    fret.className = "fret";
    fret.textContent = f;
    fret.dataset.string = s;
    fret.dataset.fret = f;

    fret.addEventListener("pointerdown", e=>{
      e.stopPropagation();
      if (currentChord) return;
      heldFrets[s] = f;
      fret.classList.add("active");
    });

    const release = ()=>{
      if (currentChord) return;
      delete heldFrets[s];
      fret.classList.remove("active");
    };

    fret.addEventListener("pointerup", release);
    fret.addEventListener("pointerleave", release);
    fret.addEventListener("pointercancel", release);

    stringEl.appendChild(fret);
  }

  const strum = document.createElement("div");
  strum.className = "strum";
  stringEl.appendChild(strum);

  box.appendChild(stringEl);
}

// аудио
const audios = {};
for (let s=1; s<=6; s++){
  audios[s] = new Audio(`sounds/${s}.mp3`);
  for (let f=1; f<=6; f++){
    audios[`${s}-${f}`] = new Audio(`sounds/${s}-${f}.mp3`);
  }
}

// звук
function playString(string, fret=null){
  const key = fret ? `${string}-${fret}` : string;
  const audio = audios[key];
  if (!audio) return;

  audio.currentTime = 0;
  audio.play();

  const strumEl = document.querySelector(`[data-string="${string}"] .strum`);
  strumEl?.classList.add("active");
  setTimeout(()=>strumEl?.classList.remove("active"),100);

  if (fret){
    const fretEl = document.querySelector(
      `.fret[data-string="${string}"][data-fret="${fret}"]`
    );

    fretEl?.classList.add("active");

    setTimeout(()=>{
      if (!fretEl.classList.contains("chord-active")){
        fretEl.classList.remove("active");
      }
    },150);
  }
}

// свайп
function handlePointer(e){
  const el = document.elementFromPoint(e.clientX,e.clientY);
  const stringEl = el?.closest(".string");
  if (!stringEl) return;

  const s = stringEl.dataset.string;
  if (touched.has(s)) return;
  touched.add(s);
  playString(s, heldFrets[s]);
}

box.addEventListener("pointerdown", e=>{
  pointerDown = true;
  touched.clear();
  handlePointer(e);
});

document.addEventListener("pointermove", e=>{
  if (!pointerDown) return;
  e.preventDefault();
  handlePointer(e);
}, { passive: false });

document.addEventListener("pointerup", ()=>{
  pointerDown = false;
  touched.clear();
});

// блокируем скролл
document.addEventListener("touchmove", function(e){
  if (pointerDown) e.preventDefault();
}, { passive: false });

// аккорды
const buttons = document.querySelectorAll(".chords button");

buttons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const name = btn.dataset.chord;

    if (currentChord === name){
      clearChord();
      currentChord = null;
      btn.classList.remove("active");
      return;
    }

    clearChord();
    currentChord = name;
    btn.classList.add("active");

    const chord = chords[name];

    for (let s in chord){
      heldFrets[s] = chord[s];
      const el = document.querySelector(
        `.fret[data-string="${s}"][data-fret="${chord[s]}"]`
      );
      el?.classList.add("chord-active");
    }
  });
});

function clearChord(){
  for (let k in heldFrets) delete heldFrets[k];
  document.querySelectorAll(".fret").forEach(f=>{
    f.classList.remove("active");
    f.classList.remove("chord-active");
  });
  document.querySelectorAll(".chords button").forEach(b=>b.classList.remove("active"));
}

// мелодия
function playMelody(sequence, speed=300){
  const notes = sequence.trim().split(/\s+/);
  let i=0;

  function step(){
    if (i>=notes.length) return;

    const note = notes[i];

    if (note.toLowerCase() === 'р'){
      i++;
      return setTimeout(step, speed);
    }

    let s = note;
    let f = null;

    if (note.includes('/')){
      [s,f] = note.split('/');
    }

    if (/^[1-6]$/.test(s)){
      playString(s, f);
    }

    i++;
    setTimeout(step, speed);
  }

  step();
}

document.getElementById("playMelodyBtn").onclick = ()=>{
  const val = document.getElementById("melodyInput").value;
  if (!val) return;
  playMelody(val, 250);
};

document.addEventListener("contextmenu", e=>e.preventDefault());
</script>

</body>
</html>
