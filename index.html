<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>

<style>
html, body {
  margin:0; padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* { user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }

h1 { margin:10px; }

.box { display:flex; gap:15px; }

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
}

.fret { flex:0 0 8%; border-bottom:1px solid rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; }
.fret.active, .fret.chord-active { background:orange; }

.strum { flex:1; background:rgba(0,0,0,0.05); }
.strum.active { background:orange; }

.chords {
  display:grid; grid-template-columns:repeat(4,90px); gap:10px; margin:15px 10px;
}
.chords button { height:50px; border:2px solid black; cursor:pointer; }
.chords button.active { background:orange; }

.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
input { padding:6px; width:260px; font-size:14px; }
button { padding:6px 12px; font-size:14px; cursor:pointer; }
</style>
</head>
<body>

<h1>Guitar 10.18</h1>

<div class="box" id="box"></div>

<script>
let audioCtx = null;
const audioBuffers = {};
const heldFrets = {};
let pointerDown = false;
const touchedStrings = new Set();

const SOUND_FILES = {};
for(let s=1;s<=6;s++){
  SOUND_FILES[s] = `sounds/${s}.mp3`;
  for(let f=1;f<=6;f++) SOUND_FILES[`${s}-${f}`]=`sounds/${s}-${f}.mp3`;
}

function unlockAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
}

function playSound(key){
  if(!audioCtx) unlockAudio();

  if(!audioBuffers[key]){
    fetch(SOUND_FILES[key])
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{
        audioBuffers[key]=decoded;
        playSound(key);
      });
    return;
  }

  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

const box = document.getElementById("box");

// создание
for(let s=6;s>=1;s--){
  const stringEl=document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;

  for(let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;
    fret.dataset.string=s;
    fret.dataset.fret=f;

    fret.addEventListener("pointerdown",e=>{
      e.stopPropagation();
      unlockAudio();
      heldFrets[s]=f;
      fret.classList.add("active");
    });

    const release=()=>{
      delete heldFrets[s];
      fret.classList.remove("active");
    };

    fret.addEventListener("pointerup",release);
    fret.addEventListener("pointerleave",release);
    fret.addEventListener("pointercancel",release);

    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";
  strum.dataset.string=s;

  strum.addEventListener("pointerdown",e=>{
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  });

  stringEl.appendChild(strum);
  box.appendChild(stringEl);
}

// ❗ ЖЁСТКО: звук только для этой струны
function playString(s){
  let f = heldFrets[s] ?? null;
  let key = f ? `${s}-${f}` : String(s);

  playSound(key);

  const strumEl=document.querySelector(`.string[data-string="${s}"] .strum`);
  strumEl?.classList.add("active");
  setTimeout(()=>strumEl?.classList.remove("active"),120);
}

// ❗ БЕЗ fallback — только реальное попадание
function handleStrum(e){
  const el = document.elementFromPoint(e.clientX,e.clientY);

  if(!el || !el.classList.contains("strum")) return;

  const s = el.dataset.string;

  if(touchedStrings.has(s)) return;

  touchedStrings.add(s);
  playString(s);
}

document.addEventListener("pointermove",e=>{
  if(pointerDown){
    e.preventDefault();
    handleStrum(e);
  }
},{passive:false});

document.addEventListener("pointerup",()=>{
  pointerDown=false;
  touchedStrings.clear();
});

// внешний свайп
document.addEventListener("pointerdown", e => {
  if (e.target.closest(".fret")) return;

  const el = document.elementFromPoint(e.clientX,e.clientY);
  if(el?.classList.contains("strum")){
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  }
});

document.addEventListener("contextmenu",e=>e.preventDefault());
</script>
</body>
</html>
