<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>
<style>
html, body {
  margin:0; padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* { user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }

h1 { margin:10px; }

/* Плавное появление */
.fade-in {
  opacity:0;
  transform:translateY(10px);
  transition: all 0.5s ease;
}
.fade-in.show {
  opacity:1;
  transform:translateY(0);
}

.box { display:flex; gap:15px; }

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
  transition: transform 0.1s;
}
.string:active {
  transform:scale(0.97);
}

.fret { flex:0 0 8%; border-bottom:1px solid rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; }
.fret.active, .fret.chord-active { background:orange; }

.strum { flex:1; background:rgba(0,0,0,0.05); }
.strum.active { background:orange; }

.chords {
  display:grid; grid-template-columns:repeat(4,90px); gap:10px; margin:15px 10px;
}
.chords button { height:50px; border:2px solid black; cursor:pointer; }
.chords button.active { background:orange; }

.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
input { padding:6px; width:260px; font-size:14px; }
button { padding:6px 12px; font-size:14px; cursor:pointer; }

/* Welcome screen */
#welcome {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition: all 0.4s ease;
}
#welcome.hide {
  opacity:0;
  transform:scale(1.1);
  pointer-events:none;
}

#welcome h2 { margin-bottom:20px; }
#welcome button { padding:10px 20px; font-size:18px; cursor:pointer; }
#welcome .icon { font-size:70px; margin-bottom:20px; }
</style>
</head>
<body>

<div id="welcome">
  <div class="icon">🎸</div>
  <h2>Guitar Universal Audio 1</h2>
  <button id="okBtn">OK</button>
</div>

<h1 class="fade-in">Guitar 10.18</h1>

<div class="melody fade-in">
  <input id="melodyInput" placeholder="6/3 5/2 d:6-1@200$Am">
  <button id="playBtn">Играть</button>
</div>

<div class="box fade-in" id="box" style="display:none;"></div>

<div class="chords fade-in" style="display:none;">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx = null;
const audioBuffers = {};
const heldFrets = {};
let currentChord = null;
let pointerDown = false;
const touchedStrings = new Set();

const chords = {
  "Am": {2:1,3:2,4:2},
  "Em": {5:2,4:2},
  "C": {2:1,4:2,5:3},
  "G": {1:3,6:3,5:2},
  "Dm": {1:1,2:3,3:2},
  "E": {3:1,4:2,5:2},
  "A": {2:2,3:2,4:2},
  "D": {1:2,2:3,3:2}
};

const SOUND_FILES = {};
for(let s=1;s<=6;s++){
  SOUND_FILES[s] = `sounds/${s}.mp3`;
  for(let f=1;f<=6;f++) SOUND_FILES[`${s}-${f}`]=`sounds/${s}-${f}.mp3`;
}

function unlockAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
}

function playSound(key){
  if(!audioCtx) unlockAudio();
  if(!audioBuffers[key]) {
    fetch(SOUND_FILES[key])
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{ audioBuffers[key]=decoded; playSound(key); });
    return;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

function initGuitar(){
  const box = document.getElementById("box");
  const chordsDiv = document.querySelector(".chords");

  box.style.display="flex";
  chordsDiv.style.display="grid";

  setTimeout(()=>{
    document.querySelectorAll(".fade-in").forEach(el=>el.classList.add("show"));
  },50);

  for(let s=6;s>=1;s--){
    const stringEl=document.createElement("div");
    stringEl.className="string";
    stringEl.dataset.string=s;

    for(let f=1;f<=6;f++){
      const fret=document.createElement("div");
      fret.className="fret";
      fret.textContent=f;
      fret.dataset.string=s;
      fret.dataset.fret=f;

      fret.addEventListener("pointerdown",e=>{
        e.stopPropagation();
        unlockAudio();
        heldFrets[s]=f;
        fret.classList.add("active");
      });

      const release=()=>{ delete heldFrets[s]; fret.classList.remove("active"); };
      fret.addEventListener("pointerup",release);
      fret.addEventListener("pointerleave",release);
      fret.addEventListener("pointercancel",release);

      stringEl.appendChild(fret);
    }

    const strum=document.createElement("div");
    strum.className="strum";
    strum.dataset.string=s;

    strum.addEventListener("pointerdown",e=>{
      unlockAudio();
      pointerDown=true;
      touchedStrings.clear();
      handleStrum(e);
    });

    stringEl.appendChild(strum);
    box.appendChild(stringEl);
  }

  function playNote(s,f){
    let key = f!=null ? `${s}-${f}` : `${s}`;
    playSound(key);
  }

  function playString(s){
    let f=null;
    if(heldFrets[s]!=null) f=heldFrets[s];
    else if(currentChord && chords[currentChord]?.[s]) f=chords[currentChord][s];
    playNote(s,f);
  }

  function handleStrum(e){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(!el || !el.classList.contains("strum")) return;
    const s=el.dataset.string;
    if(!s || touchedStrings.has(s)) return;
    touchedStrings.add(s);
    playString(s);
  }

  document.addEventListener("pointermove",e=>{
    if(pointerDown){ e.preventDefault(); handleStrum(e); }
  },{passive:false});

  document.addEventListener("pointerup",()=>{
    pointerDown=false;
    touchedStrings.clear();
  });

  document.addEventListener("pointerdown", e => {
    if (e.target.closest("input, button")) return;
    const rect = box.getBoundingClientRect();
    const margin = 60;
    if (
      e.clientX >= rect.left - margin &&
      e.clientX <= rect.right + margin &&
      e.clientY >= rect.top &&
      e.clientY <= rect.bottom
    ){
      unlockAudio();
      pointerDown = true;
      touchedStrings.clear();
      handleStrum(e);
    }
  });
}

// welcome animation + запуск
document.getElementById("okBtn").addEventListener("pointerdown", ()=>{
  unlockAudio();
  const w = document.getElementById("welcome");
  w.classList.add("hide");

  setTimeout(()=>{
    w.style.display="none";
    initGuitar();
  }, 400);
});
</script>

</body>
</html>
