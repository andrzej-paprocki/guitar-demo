<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m.Guitar</title>

<style>
html { background: grey; }

body {
  touch-action:none;
  background: rgb(48,56,65);
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  overscroll-behavior:none;
}

html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
}

* {
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

h1 { margin:10px; color: whitesmoke; }

.wrapper { display:flex; gap:10px; height:calc(100dvh - 220px); }

.box {
  display:flex;
  gap:0;
  align-items:stretch;
  height:80%;
  width:400px;
}

.string {
  display:flex;
  flex-direction:column;
  width:54px;
  height:calc(100dvh - 220px);
  position:relative;
}

.string::after {
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:3px;
  background:grey;
  transform:translateX(-50%);
}

.fret {
  flex:0 0 50px;
  border-radius:50px;
  background:grey;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.fret.active { background:orange; }

.strum {
  width:54px;
  height:60vh;
}

.strum.active { background:orange; }

</style>
</head>

<body>

<h1>m.Guitar 1</h1>

<div class="wrapper">
  <div class="box" id="box"></div>
</div>

<script>
let audioCtx=null;
const audioBuffers={};

let pointerDown=false;
const activeFretByString={}; // 🔥 ВАЖНО: только временное состояние

function unlockAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
}

function playSound(key){
  if(!audioCtx) return;

  if(!audioBuffers[key]){
    fetch(`sounds/${key}.mp3`)
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{
        audioBuffers[key]=decoded;
        playSound(key);
      });
    return;
  }

  const src=audioCtx.createBufferSource();
  src.buffer=audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

/* BUILD */
const box=document.getElementById("box");

for(let s=6;s>=1;s--){
  const stringEl=document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;

  for(let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;

    fret.addEventListener("pointerdown",e=>{
      e.stopPropagation();
      unlockAudio();

      // 💥 важно: сохраняем ТОЛЬКО локально во время касания
      activeFretByString[s]=f;
    });

    fret.addEventListener("pointerup",()=>{
      delete activeFretByString[s];
    });

    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";

  strum.addEventListener("pointerdown",e=>{
    unlockAudio();
    pointerDown=true;
    playString(s);
  });

  stringEl.appendChild(strum);
  box.appendChild(stringEl);
}

/* 🔥 ГЛАВНАЯ ЛОГИКА */
function playString(s){
  const fret = activeFretByString[s] ?? null; 
  // ❗ НЕТ влияния других струн вообще

  const key = fret ? `${s}-${fret}` : String(s);
  playSound(key);

  const el=document.querySelector(`.string[data-string="${s}"]`);
  el?.classList.add("active");

  setTimeout(()=>el?.classList.remove("active"),150);
}

/* STRUM GLOBAL */
document.addEventListener("pointerdown",e=>{
  const el = e.target.closest(".strum");
  if(!el) return;

  unlockAudio();
  const s = el.parentElement.dataset.string;
  playString(s);
});

document.addEventListener("pointerup",()=>{
  pointerDown=false;
});
</script>

</body>
</html>
