<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guitar</title>

<style>
body {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background-color: pink;
  height: 100vh;
  user-select: none;
}

h1 { font-size: 6vw; color: white; }

.box { display: flex; gap: 15px; touch-action: none; }

.string {
  display: flex;
  flex-direction: column;
  width: 50px;
  height: 60vh;
  border: 2px solid black;
  border-radius: 10px;
  overflow: hidden;
  background: lightgrey;
  user-select: none;
}

.fret {
  flex: 0 0 8%;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  user-select: none;
  -webkit-user-drag: none;
  cursor: pointer;
}

.fret.active { background: #ffb3b3; }

.strum { flex: 1; background: rgba(0,0,0,0.05); }
.strum.active { background: orange; }

button { margin: 10px; padding: 10px; cursor: pointer; }
</style>
</head>

<body>

<h1>Guitar</h1>
<button id="playBtn">Играть</button>
<div class="box" id="box"></div>

<script>
const box = document.getElementById("box");
const touched = new Set();
const activeFrets = {};        // текущие зажатые лады для ПК
const touchActiveFrets = {};   // временные лады для тачскрина

// 🎸 Создаем струны
for (let s = 1; s <= 6; s++) {
  const stringEl = document.createElement("div");
  stringEl.className = "string";
  stringEl.dataset.string = s;

  // Лады
  for (let f = 1; f <= 6; f++) {
    const fret = document.createElement("div");
    fret.className = "fret";
    fret.textContent = f;
    fret.dataset.fret = f;

    // Компьютер: клик → toggle
    fret.addEventListener("mousedown", e => {
      e.preventDefault();
      const stringNum = stringEl.dataset.string;
      if (activeFrets[stringNum] === f) {
        delete activeFrets[stringNum];
        fret.classList.remove("active");
      } else {
        activeFrets[stringNum] = f;
        highlight(stringEl, f);
      }
    });

    // Телефон: touchstart → включаем, touchend → выключаем
    fret.addEventListener("touchstart", e => {
      e.stopPropagation();
      const stringNum = stringEl.dataset.string;
      touchActiveFrets[stringNum] = f;
      highlight(stringEl, f);
    });

    fret.addEventListener("touchend", e => {
      e.stopPropagation();
      const stringNum = stringEl.dataset.string;
      delete touchActiveFrets[stringNum];
      fret.classList.remove("active");
    });

    stringEl.appendChild(fret);
  }

  // Удар по струне
  const strum = document.createElement("div");
  strum.className = "strum";

  strum.addEventListener("mousedown", () => playString(s));
  strum.addEventListener("touchstart", () => playString(s));

  stringEl.appendChild(strum);
  box.appendChild(stringEl);
}

// 🎧 Аудио
const audios = {};
for (let s = 1; s <= 6; s++) {
  audios[s] = new Audio(`sounds/${s}.mp3`);
  for (let f = 1; f <= 6; f++) {
    audios[`${s}-${f}`] = new Audio(`sounds/${s}-${f}.mp3`);
  }
}

// Игра струны
function playString(num) {
  let key = activeFrets[num] || touchActiveFrets[num] || num;
  const audio = audios[key];
  if (!audio) return;

  audio.currentTime = 0;
  audio.play();

  const el = document.querySelector(`[data-string="${num}"] .strum`);
  if (el) {
    el.classList.add("active");
    setTimeout(() => el.classList.remove("active"), 100);
  }
}

// Подсветка ладов
function highlight(stringEl, f) {
  stringEl.querySelectorAll(".fret").forEach(x => x.classList.remove("active"));
  stringEl.children[f-1].classList.add("active");
}

// Свайп тач
function handleTouch(touch) {
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const stringEl = el?.closest(".string");
  if (!stringEl) return;

  const num = stringEl.dataset.string;
  if (!touched.has(num)) {
    playString(num);
    touched.add(num);
  }
}

box.addEventListener("touchstart", e => { touched.clear(); handleTouch(e.touches[0]); });
box.addEventListener("touchmove", e => handleTouch(e.touches[0]));
box.addEventListener("touchend", () => touched.clear());

// Мышь (зажал + провёл)
let mouseDown = false;
document.addEventListener("mousedown", e => { mouseDown = true; touched.clear(); e.preventDefault(); });
document.addEventListener("mouseup", () => { mouseDown = false; touched.clear(); });
document.addEventListener("mousemove", e => {
  if (!mouseDown) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const stringEl = el?.closest(".string");
  if (!stringEl) return;
  const num = stringEl.dataset.string;
  if (!touched.has(num)) { playString(num); touched.add(num); }
});

// Клавиатура
const pressedKeys = new Set();
document.addEventListener("keydown", e => {
  const key = e.key;
  if (/^F[1-6]$/.test(key)) {
    e.preventDefault();
    const fret = key.replace("F", "");
    for (let i=1;i<=6;i++) activeFrets[i] = fret;
    return;
  }
  if (/^[1-6]$/.test(key) && !pressedKeys.has(key)) {
    pressedKeys.add(key);
    playString(key);
  }
});
document.addEventListener("keyup", e => {
  const key = e.key;
  if (/^F[1-6]$/.test(key)) {
    for (let i=1;i<=6;i++) delete activeFrets[i];
  }
  pressedKeys.delete(key);
});

// Мелодия
function playMelody(sequence, speed=300) {
  return new Promise(resolve => {
    let i=0;
    function step() {
      if(i>=sequence.length) return resolve();
      const note = sequence[i];
      if(/^[1-6]$/.test(note)) playString(note);
      i++;
      setTimeout(step,speed);
    }
    step();
  });
}

document.getElementById("playBtn").addEventListener("click", () => {
  const input = prompt("Введи последовательность струн:");
  if(!input) return;
  playMelody(input, 250);
});
</script>

</body>
</html>
