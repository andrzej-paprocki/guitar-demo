<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guitar Slide Mode</title>

<style>
body {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background-color: pink;
  height: 100vh;
}

* {
  -webkit-tap-highlight-color: transparent;
}

.box {
  display: flex;
  gap: 15px;
  touch-action: none;
}

.string {
  display: flex;
  flex-direction: column;
  width: 50px;
  height: 60vh;
  border: 2px solid black;
  background: lightgrey;
}

.fret {
  flex: 0 0 8%;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
}

.fret.active { background: orange; }

.strum { flex: 1; background: rgba(0,0,0,0.05); }
.strum.active { background: orange; }
</style>
</head>

<body>

<h1>Guitar Slide</h1>
<div class="box" id="box"></div>

<script>
const box = document.getElementById("box");

// 🎧 аудио
const audios = {};
for (let s=1;s<=6;s++){
  audios[s] = new Audio(`sounds/${s}.mp3`);
  for (let f=1;f<=6;f++){
    audios[`${s}-${f}`] = new Audio(`sounds/${s}-${f}.mp3`);
  }
}

// 🎸 струны
for (let s=6;s>=1;s--){
  const stringEl = document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;

  for (let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;
    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";
  stringEl.appendChild(strum);

  box.appendChild(stringEl);
}

// 👉 активные пальцы
const active = new Map();

// ▶️ play
function play(key){
  const a = audios[key];
  if (!a) return null;
  a.currentTime=0;
  a.play();
  return a;
}

// ⛔ stop
function stop(a){
  if (!a) return;
  a.pause();
  a.currentTime=0;
}

// 🎯 что под пальцем
function getNote(e){
  const el = document.elementFromPoint(e.clientX,e.clientY);
  const stringEl = el?.closest(".string");
  if (!stringEl) return null;

  const s = stringEl.dataset.string;

  if (el.classList.contains("fret")){
    return {key:`${s}-${el.textContent}`, el};
  }

  return {key:`${s}`, el};
}

// 🖐️ DOWN
box.addEventListener("pointerdown", e=>{
  const note = getNote(e);
  if (!note) return;

  const audio = play(note.key);

  active.set(e.pointerId,{
    key: note.key,
    audio,
    el: note.el
  });

  highlight(note.el);
});

// 🖐️ MOVE (🔥 slide)
document.addEventListener("pointermove", e=>{
  const state = active.get(e.pointerId);
  if (!state) return;

  const note = getNote(e);
  if (!note) return;

  if (note.key !== state.key){
    stop(state.audio);
    state.audio = play(note.key);
    state.key = note.key;
    highlight(note.el);
  }
});

// 🖐️ UP
document.addEventListener("pointerup", e=>{
  const state = active.get(e.pointerId);
  if (!state) return;

  stop(state.audio);
  active.delete(e.pointerId);
});

// 🎨 подсветка
function highlight(el){
  el.classList.add("active");
  setTimeout(()=>el.classList.remove("active"),150);
}
</script>

</body>
</html>
