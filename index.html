<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guitar Stable FINAL</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  touch-action: none;
  overscroll-behavior: none;
  background: pink;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.box { display: flex; gap: 15px; margin-top: 20px; }

.string {
  display: flex;
  flex-direction: column;
  width: 50px;
  height: 60vh;
  border: 2px solid black;
  background: lightgrey;
}

.fret {
  flex: 0 0 8%;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}

.fret.active { background: orange; }
.fret.chord-active { background: orange; }

.strum { flex:1; background: rgba(0,0,0,0.05); }
.strum.active { background: orange; }

.chords {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.chords button.active { background: orange; }

h1 { margin: 10px; }
</style>
</head>

<body>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<h1>Guitar</h1>
<div class="box" id="box"></div>

<script>
const box = document.getElementById("box");
let pointerDown = false;

// 🔑 защита от дублей
const played = new Set();

const chords = {
  "Am": {2:1, 3:2, 4:2},
  "Em": {5:2, 4:2},
  "C":  {2:1, 4:2, 5:3},
  "G":  {1:3, 6:3, 5:2},
  "Dm": {1:1, 2:3, 3:2},
  "E":  {3:1, 4:2, 5:2},
  "A":  {2:2, 3:2, 4:2},
  "D":  {1:2, 2:3, 3:2}
};

let currentChord = null;

// 🎸 создаем струны
for (let s=6; s>=1; s--){
  const stringEl = document.createElement("div");
  stringEl.className = "string";
  stringEl.dataset.string = s;

  for (let f=1; f<=6; f++){
    const fret = document.createElement("div");
    fret.className = "fret";
    fret.textContent = f;
    fret.dataset.string = s;
    fret.dataset.fret = f;
    stringEl.appendChild(fret);
  }

  const strum = document.createElement("div");
  strum.className = "strum";
  strum.dataset.string = s;
  stringEl.appendChild(strum);

  box.appendChild(stringEl);
}

// 🔊 аудио
const audios = {};
for (let s=1; s<=6; s++){
  audios[s] = new Audio(`sounds/${s}.mp3`);
  for (let f=1; f<=6; f++){
    audios[`${s}-${f}`] = new Audio(`sounds/${s}-${f}.mp3`);
  }
}

// ▶️ звук
function play(string, fret=null){
  const key = fret ? `${string}-${fret}` : string;
  const audio = audios[key];
  if (!audio) return;

  audio.currentTime = 0;
  audio.play();

  const strum = document.querySelector(`[data-string="${string}"] .strum`);
  strum?.classList.add("active");
  setTimeout(()=>strum?.classList.remove("active"),100);

  if (fret){
    const fretEl = document.querySelector(
      `.fret[data-string="${string}"][data-fret="${fret}"]`
    );
    fretEl?.classList.add("active");
    setTimeout(()=>fretEl?.classList.remove("active"),150);
  }
}

// 🎯 единая обработка
function handle(e){
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (!el) return;

  const string = el.dataset.string;
  if (!string) return;

  let key;

  if (el.classList.contains("strum")){
    key = `${string}-0`;
    if (played.has(key)) return;
    played.add(key);
    play(string);
  }

  if (el.classList.contains("fret")){
    const fret = el.dataset.fret;
    key = `${string}-${fret}`;
    if (played.has(key)) return;
    played.add(key);
    play(string, fret);
  }
}

// события
box.addEventListener("pointerdown", e=>{
  pointerDown = true;
  played.clear();
  handle(e);
});

document.addEventListener("pointermove", e=>{
  if (!pointerDown) return;
  e.preventDefault();
  handle(e);
}, { passive:false });

document.addEventListener("pointerup", ()=>{
  pointerDown = false;
  played.clear();
});

// блок скролла
document.addEventListener("touchmove", e=>{
  if (pointerDown) e.preventDefault();
}, { passive:false });

// 🎵 аккорды
const buttons = document.querySelectorAll(".chords button");

buttons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const name = btn.dataset.chord;

    document.querySelectorAll(".fret").forEach(f=>{
      f.classList.remove("chord-active");
    });

    buttons.forEach(b=>b.classList.remove("active"));

    if (currentChord === name){
      currentChord = null;
      return;
    }

    currentChord = name;
    btn.classList.add("active");

    const chord = chords[name];

    for (let s in chord){
      const el = document.querySelector(
        `.fret[data-string="${s}"][data-fret="${chord[s]}"]`
      );
      el?.classList.add("chord-active");
    }
  });
});

document.addEventListener("contextmenu", e=>e.preventDefault());
</script>

</body>
</html>
