<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guitar Clean Stable</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  touch-action: none;
  overscroll-behavior: none;
  background: pink;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

* {
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

h1 { margin: 10px; }

.box { 
  display: flex; 
  gap: 15px; 
  margin-top: 20px; 
}

.string {
  display: flex;
  flex-direction: column;
  width: 50px;
  height: 60vh;
  border: 2px solid black;
  background: lightgrey;
}

.fret {
  flex: 0 0 8%;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* подсветка зажатого лада */
.fret.held { background: orange; }

/* временная подсветка при бою/свободной игре */
.strum { flex:1; background: rgba(0,0,0,0.05); }
.strum.active { background: orange; }

.chords {
  display: grid;
  grid-template-columns: repeat(4, 90px);
  gap: 13px;
  margin: 15px 0;
  justify-content: center;
}
.chords button {
  width: 90px;
  height: 50px;
  border: 2px solid black;
  background: white;
  font-size: 16px;
  cursor: pointer;
}
.chords button.active { background: orange; }

.melody-input {
  margin: 10px 0;
}
</style>
</head>

<body>

<h1>Guitar test 3</h1>

<div class="melody-input">
  <input id="melodyInput" placeholder="1 2/3 р 3 4/2 5 6 u:1-5@200$Am">
  <button id="playMelodyBtn">Играть</button>
</div>

<div class="box" id="box"></div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let pointerDown = false;
const touchedStrings = new Set();
const heldFrets = {};
let currentChord = null;

// ✅ AudioContext для корректного первого касания
let audioCtx = null; 
const audios = {}; // будут храниться Audio элементы для каждой струны и лада

function unlockAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume();
  // создаем Audio элементы
  for(let s=1; s<=6; s++){
    audios[s] = new Audio(`sounds/${s}.mp3`);
    for(let f=1; f<=6; f++){
      audios[`${s}-${f}`] = new Audio(`sounds/${s}-${f}.mp3`);
    }
  }
}

// 🎸 аккорды
const chords = {
  "Am": {2:1, 3:2, 4:2},
  "Em": {5:2, 4:2},
  "C":  {2:1, 4:2, 5:3},
  "G":  {1:3, 6:3, 5:2},
  "Dm": {1:1, 2:3, 3:2},
  "E":  {3:1, 4:2, 5:2},
  "A":  {2:2, 3:2, 4:2},
  "D":  {1:2, 2:3, 3:2}
};

// 🎸 создаём струны и лады
const box = document.getElementById("box");
for(let s=6; s>=1; s--){
  const stringEl = document.createElement("div");
  stringEl.className = "string";
  stringEl.dataset.string = s;

  for(let f=1; f<=6; f++){
    const fret = document.createElement("div");
    fret.className = "fret";
    fret.dataset.string = s;
    fret.dataset.fret = f;
    fret.textContent = f;

    // зажатие лада
    fret.addEventListener("pointerdown", e=>{
      e.stopPropagation();
      unlockAudio();
      heldFrets[s]=f;
      fret.classList.add("held");
    });

    const release = ()=>{
      delete heldFrets[s];
      fret.classList.remove("held");
    };

    fret.addEventListener("pointerup", release);
    fret.addEventListener("pointerleave", release);
    fret.addEventListener("pointercancel", release);

    stringEl.appendChild(fret);
  }

  const strum = document.createElement("div");
  strum.className = "strum";
  strum.dataset.string = s;
  strum.addEventListener("pointerdown", e=>{
    unlockAudio(); // 🔑 разблокировка AudioContext
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  });

  stringEl.appendChild(strum);
  box.appendChild(stringEl);
}

// ▶️ воспроизведение
function playString(s, fretOverride=null){
  const fret = fretOverride!==null?fretOverride:heldFrets[s];
  const key = fret ? `${s}-${fret}` : s;
  const audio = audios[key];
  if(!audio) return;

  audio.currentTime=0;
  audio.play();

  const strumEl = document.querySelector(`[data-string="${s}"] .strum`);
  strumEl?.classList.add("active");
  setTimeout(()=>strumEl?.classList.remove("active"),100);
}

// 🎯 обработка свайпа по струнам
function handleStrum(e){
  const el = document.elementFromPoint(e.clientX,e.clientY);
  if(!el || !el.classList.contains("strum")) return;

  const s = el.dataset.string;
  if(touchedStrings.has(s)) return;
  touchedStrings.add(s);

  playString(s, null);
}

document.addEventListener("pointermove", e=>{
  if(!pointerDown) return;
  e.preventDefault();
  handleStrum(e);
},{passive:false});

document.addEventListener("pointerup", ()=>{
  pointerDown=false;
  touchedStrings.clear();
});

// 🎵 кнопки аккордов
const buttons = document.querySelectorAll(".chords button");

function clearChord(){
  for(let k in heldFrets) delete heldFrets[k];
  document.querySelectorAll(".fret").forEach(f=>{
    f.classList.remove("held");
  });
  buttons.forEach(b=>b.classList.remove("active"));
}

buttons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const name = btn.dataset.chord;
    if(currentChord===name){
      clearChord();
      currentChord=null;
      return;
    }
    clearChord();
    currentChord=name;
    btn.classList.add("active");
    const chord = chords[name];
    for(let s in chord){
      heldFrets[s]=chord[s];
      const el = document.querySelector(`.fret[data-string="${s}"][data-fret="${chord[s]}"]`);
      el?.classList.add("held");
    }
  });
});

// 🎵 мелодия
const melodyInput = document.getElementById("melodyInput");
const playMelodyBtn = document.getElementById("playMelodyBtn");

function playMelody(seq, speed=300){
  clearChord(); // выключаем все кнопки аккордов
  const notes = seq.trim().split(/\s+/);
  let i=0;
  function step(){
    if(i>=notes.length) return;
    let note=notes[i];
    let chordOverride=null;

    if(note.includes('$')){
      const parts=note.split('$');
      note=parts[0];
      chordOverride=parts[1];
    }

    if(note.toLowerCase()!=='р'){
      let s=f=null;
      if(note.includes('/')) [s,f]=note.split('/');
      else s=note;
      if(/^[1-6]$/.test(s)) playString(s, f?f:(chordOverride?chords[chordOverride][s]:null));
      if(note.startsWith('u:')||note.startsWith('d:')){
        const m=note.match(/([ud]):(\d+)-(\d+)@(\d+)(?:\$(\w+))?/);
        if(m){
          const dir=m[1], start=parseInt(m[2]), end=parseInt(m[3]), sp=parseInt(m[4]), ch=m[5];
          const stepArr=[];
          if(dir==='u'){
            for(let x=start;x<=end;x++) stepArr.push(x);
          } else {
            for(let x=start;x>=end;x--) stepArr.push(x);
          }
          let idx=0;
          const playStep=()=>{
            if(idx>=stepArr.length) return;
            const str=stepArr[idx].toString();
            playString(str,ch?chords[ch][str]:null);
            idx++;
            setTimeout(playStep, sp);
          };
          playStep();
        }
      }
    }
    i++;
    setTimeout(step, speed);
  }
  step();
}

playMelodyBtn.addEventListener("click", ()=>{
  unlockAudio(); // 🔑 разблокировка при первой кнопке "Играть"
  clearChord();
  playMelody(melodyInput.value, 250);
});

// блокируем скролл и контекстное меню
document.addEventListener("touchmove", e=>{if(pointerDown) e.preventDefault();},{passive:false});
document.addEventListener("selectstart", e=>e.preventDefault());
document.addEventListener("contextmenu", e=>e.preventDefault());
</script>

</body>
</html>
