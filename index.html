<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>

<style>
html, body {
  margin:0;
  padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* {
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

h1 { margin:10px; }

/* welcome */
#welcome {
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* layout */
.box {
  display:flex;
  gap:10px;
  align-items:flex-start;
}

/* barre */
.barre-panel {
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:60vh;
}

.barre {
  height:8%;
  width:60px;
  background:#ddd;
  border:1px solid black;
  display:flex;
  align-items:center;
  justify-content:center;
}
.barre.active {
  background:orange;
}

/* strings */
#box {
  display:flex;
  gap:10px;
}

.string {
  display:flex;
  flex-direction:column;
  width:35px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
  position:relative;
}

.string::after {
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:2px;
  background:black;
  transform:translateX(-50%);
  opacity:0.6;
}

.string.vibrate::after {
  animation:vibe 0.15s linear;
}

@keyframes vibe {
  0% { transform:translateX(-50%) translateX(0); }
  25% { transform:translateX(-50%) translateX(2px); }
  50% { transform:translateX(-50%) translateX(-2px); }
  75% { transform:translateX(-50%) translateX(1px); }
  100% { transform:translateX(-50%) translateX(0); }
}

/* frets */
.fret {
  flex:0 0 8%;
  border-bottom:1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}
.fret.active { background:orange; }
.fret.chord-active { background:#ffcc66; }

/* strum */
.strum {
  flex:1;
  background:rgba(0,0,0,0.05);
}
.strum.active { background:orange; }

/* chords */
.chords {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:10px;
  margin:15px;
}
.chords button.active { background:orange; }

/* melody */
.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
</style>
</head>

<body>

<div id="welcome">
  <h1>🎸 Guitar Barre 1</h1>
  <button id="startBtn">OK</button>
</div>

<h1>Guitar + Barre</h1>

<div class="melody">
  <input id="melodyInput" placeholder="6/3 5/2 d:6-1@200$Am">
  <button id="playBtn">Играть</button>
</div>

<div class="box">
  <div class="barre-panel" id="barrePanel"></div>
  <div id="box"></div>
</div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx=null;
const audioBuffers={};
const heldFrets={};
let currentChord=null;
let activeBarre=null;
let pointerDown=false;
const touchedStrings=new Set();
let activeFretTouch=null;

const chords={
  "Am":{2:1,3:2,4:2},
  "Em":{5:2,4:2},
  "C":{2:1,4:2,5:3},
  "G":{1:3,6:3,5:2},
  "Dm":{1:1,2:3,3:2},
  "E":{3:1,4:2,5:2},
  "A":{2:2,3:2,4:2},
  "D":{1:2,2:3,3:2}
};

/* audio */
function unlockAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
}
function playSound(key){
  if(!audioCtx) return;

  if(!audioBuffers[key]){
    fetch(`sounds/${key}.mp3`)
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{
        audioBuffers[key]=decoded;
        playSound(key);
      });
    return;
  }

  const src=audioCtx.createBufferSource();
  src.buffer=audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

/* welcome */
document.getElementById("startBtn").onclick=()=>{
  unlockAudio();
  audioCtx.resume();

  document.getElementById("welcome").style.display="none";
};

/* barre build */
const barrePanel=document.getElementById("barrePanel");

for(let f=1;f<=6;f++){
  const b=document.createElement("div");
  b.className="barre";
  b.textContent=f;

  b.addEventListener("pointerdown",()=>{
    unlockAudio();
    activeBarre=f;

    document.querySelectorAll(".barre").forEach(el=>el.classList.remove("active"));
    b.classList.add("active");
  });

  b.addEventListener("pointerup",()=>{
    activeBarre=null;
    b.classList.remove("active");
  });

  b.addEventListener("pointerleave",()=>{
    activeBarre=null;
    b.classList.remove("active");
  });

  barrePanel.appendChild(b);
}

/* build strings */
const box=document.getElementById("box");

for(let s=6;s>=1;s--){
  const stringEl=document.createElement("div");
  stringEl.className="string";
  stringEl.dataset.string=s;

  for(let f=1;f<=6;f++){
    const fret=document.createElement("div");
    fret.className="fret";
    fret.textContent=f;

    fret.addEventListener("pointerdown",e=>{
      e.stopPropagation();
      unlockAudio();
      activeFretTouch={string:s,fret:f};

      clearFrets(s);
      heldFrets[s]=f;
      fret.classList.add("active");
    });

    fret.addEventListener("pointermove",e=>{
      if(!activeFretTouch) return;

      const el=document.elementFromPoint(e.clientX,e.clientY);
      if(!el || !el.classList.contains("fret")) return;
      if(el.parentElement.dataset.string!=s) return;

      const newF=+el.textContent;
      if(activeFretTouch.fret===newF) return;

      activeFretTouch.fret=newF;
      heldFrets[s]=newF;

      clearFrets(s);
      el.classList.add("active");
    });

    const release=()=>{
      if(activeFretTouch && activeFretTouch.string===s){
        activeFretTouch=null;
      }
      delete heldFrets[s];
      clearFrets(s);
    };

    fret.addEventListener("pointerup",release);
    fret.addEventListener("pointerleave",release);
    fret.addEventListener("pointercancel",release);

    stringEl.appendChild(fret);
  }

  const strum=document.createElement("div");
  strum.className="strum";
  strum.dataset.string=s;

  strum.addEventListener("pointerdown",e=>{
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  });

  stringEl.appendChild(strum);
  box.appendChild(stringEl);
}

function clearFrets(s){
  document.querySelectorAll(`.string[data-string="${s}"] .fret`)
    .forEach(el=>el.classList.remove("active"));
}

/* play */
function playNote(s,f){
  const key=f?`${s}-${f}`:String(s);
  playSound(key);

  const stringEl=document.querySelector(`.string[data-string="${s}"]`);
  stringEl.classList.add("vibrate");
  setTimeout(()=>stringEl.classList.remove("vibrate"),150);

  const strumEl=stringEl.querySelector(".strum");
  strumEl.classList.add("active");
  setTimeout(()=>strumEl.classList.remove("active"),150);

  if(f){
    const fretEl=document.querySelector(`.string[data-string="${s}"] .fret:nth-child(${f})`);
    fretEl.classList.add("active");
    setTimeout(()=>{ if(!heldFrets[s]) fretEl.classList.remove("active"); },150);
  }
}

function playString(s){
  let f=null;

  if(heldFrets[s]!=null) f=heldFrets[s];
  else if(activeBarre!==null) f=activeBarre;
  else if(currentChord && chords[currentChord]?.[s]) f=chords[currentChord][s];

  playNote(s,f);
}

/* strum */
function handleStrum(e){
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(!el || !el.classList.contains("strum")) return;

  const s=el.dataset.string;
  if(touchedStrings.has(s)) return;

  touchedStrings.add(s);
  playString(s);
}

document.addEventListener("pointermove",e=>{
  if(pointerDown){
    e.preventDefault();
    handleStrum(e);
  }
},{passive:false});

document.addEventListener("pointerup",()=>{
  pointerDown=false;
  touchedStrings.clear();
});

/* swipe outside */
document.addEventListener("pointerdown",e=>{
  if(e.target.closest("input, button")) return;

  const rect=box.getBoundingClientRect();
  const margin=80;

  if(
    e.clientX>=rect.left-margin &&
    e.clientX<=rect.right+margin &&
    e.clientY>=rect.top &&
    e.clientY<=rect.bottom
  ){
    unlockAudio();
    pointerDown=true;
    touchedStrings.clear();
    handleStrum(e);
  }
});

/* chords */
const buttons=document.querySelectorAll(".chords button");

buttons.forEach(btn=>{
  btn.addEventListener("pointerdown",e=>{
    e.preventDefault();
    unlockAudio();

    const name=btn.dataset.chord;

    if(currentChord===name){
      currentChord=null;
      btn.classList.remove("active");
      document.querySelectorAll(".fret").forEach(f=>f.classList.remove("chord-active"));
      return;
    }

    currentChord=name;

    buttons.forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".fret").forEach(f=>f.classList.remove("chord-active"));

    btn.classList.add("active");

    for(let s in chords[name]){
      const f=chords[name][s];
      const el=document.querySelector(`.string[data-string="${s}"] .fret:nth-child(${f})`);
      el.classList.add("chord-active");
    }
  });
});

/* melody */
document.getElementById("playBtn").onclick=()=>{
  const text=document.getElementById("melodyInput").value.trim();
  if(!text) return;

  currentChord=null;
  activeBarre=null;

  buttons.forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".fret").forEach(f=>f.classList.remove("chord-active","active"));
  document.querySelectorAll(".barre").forEach(b=>b.classList.remove("active"));
  for(let k in heldFrets) delete heldFrets[k];

  playMelody(text);
};

function playMelody(text){
  const tokens=text.split(/\s+/);
  let i=0;

  function step(){
    if(i>=tokens.length) return;

    const t=tokens[i];

    if(t.startsWith("d")||t.startsWith("u")){
      const dir=t[0];
      const range=t.match(/:(\d+)-(\d+)/);
      const speed=t.match(/@(\d+)/);
      const chord=t.match(/\$(\w+)/);

      let s1=range?+range[1]:(dir==="d"?6:1);
      let s2=range?+range[2]:(dir==="d"?1:6);
      let sp=speed?+speed[1]:80;
      let ch=chord?chord[1]:null;

      strum(s1,s2,sp,ch);

      i++;
      setTimeout(step, sp*Math.abs(s2-s1)+sp);
      return;
    }

    if(t.includes("/")){
      const [s,f]=t.split("/");
      playNote(+s,+f);
    } else if(/^[1-6]$/.test(t)){
      playString(+t);
    }

    i++;
    setTimeout(step,250);
  }

  step();
}

function strum(s1,s2,sp,ch){
  let step = s1<=s2?1:-1;

  for(let s=s1,i=0; step>0?s<=s2:s>=s2; s+=step,i++){
    setTimeout(()=>{
      let fret=null;

      if(ch && chords[ch]?.[s]){
        fret=chords[ch][s];
        const el=document.querySelector(`.string[data-string="${s}"] .fret:nth-child(${fret})`);
        el.classList.add("active");
        setTimeout(()=>el.classList.remove("active"),150);
      }

      playNote(s,fret);
    }, i*sp);
  }
}
</script>

</body>
</html>
