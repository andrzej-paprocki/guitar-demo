<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>

<style>
html, body {
  margin:0;
  padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

* {
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

h1 { margin:10px; }

/* === LAYOUT === */
.wrapper {
  display:flex;
  gap:10px;
}

/* === BARRE === */
.barreColumn {
  display:flex;
  flex-direction:column;
  height:85vh; /* ⬅️ было 60vh */
  width:40px;
}

.barre {
  flex:0 0 8%;
  border:1px solid black;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px; /* чуть крупнее */
}

.barre.active {
  background:red;
}

/* === STRINGS === */
.box {
  display:flex;
  gap:10px;
}

.string {
  display:flex;
  flex-direction:column;
  width:40px;
  height:85vh; /* ⬅️ было 60vh */
  border:2px solid black;
  background:lightgrey;
  position:relative;
}

.string::after {
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:2px;
  background:black;
  transform:translateX(-50%);
  opacity:0.6;
}

/* vibration */
.string.vibrate::after {
  animation:vibe 0.15s linear;
}

@keyframes vibe {
  0% { transform:translateX(-50%) }
  25% { transform:translateX(-48%) }
  50% { transform:translateX(-52%) }
  75% { transform:translateX(-49%) }
  100% { transform:translateX(-50%) }
}

/* frets */
.fret {
  flex:0 0 8%;
  border-bottom:1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px; /* ⬅️ увеличили текст */
}

.fret.active { background:orange; }
.fret.chord-active { background:#ffcc66; }

/* strum */
.strum {
  flex:1;
  background:rgba(0,0,0,0.05);
}
.strum.active { background:orange; }

/* chords */
.chords {
  display:grid;
  grid-template-columns:repeat(4,90px);
  gap:10px;
  margin:25px 15px; /* ⬅️ чуть ниже */
}

.chords button.active {
  background:orange;
}
</style>
</head>

<body>

<h1>Guitar + Barre 3</h1>

<div class="wrapper">

  <div class="barreColumn" id="barreColumn"></div>

  <div class="box" id="box"></div>

</div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
/* JS НЕ ТРОГАЛСЯ — ВСТАВЬ СВОЙ ИЗ ПОСЛЕДНЕЙ РАБОЧЕЙ ВЕРСИИ */
</script>

</body>
</html>
