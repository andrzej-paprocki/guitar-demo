<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Universal Audio</title>
<style>
html, body {
  margin:0; padding:0;
  touch-action:none;
  background:pink;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}
* { user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }

h1 { margin:10px; }

.box { display:flex; gap:15px; }

.string {
  display:flex;
  flex-direction:column;
  width:50px;
  height:60vh;
  border:2px solid black;
  background:lightgrey;
}

.fret { flex:0 0 8%; border-bottom:1px solid rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center; }
.fret.active, .fret.chord-active { background:orange; }

.strum { flex:1; background:rgba(0,0,0,0.05); }
.strum.active { background:orange; }

.chords {
  display:grid; grid-template-columns:repeat(4,90px); gap:10px; margin:15px 10px;
}
.chords button { height:50px; border:2px solid black; cursor:pointer; }
.chords button.active { background:orange; }

.melody {
  margin:10px;
  display:flex;
  gap:5px;
}
input { padding:6px; width:260px; font-size:14px; }
button { padding:6px 12px; font-size:14px; cursor:pointer; }

/* Welcome screen */
#welcome {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:white; display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  z-index:9999;
}
#welcome h2 { margin-bottom:20px; }
#welcome button { padding:10px 20px; font-size:16px; cursor:pointer; }
#welcome img { width:80px; height:auto; margin-bottom:20px; }
</style>
</head>
<body>

<div id="welcome">
  <img src="guitar_icon.png" alt="Guitar">
  <h2>Guitar Universal Audio</h2>
  <button id="okBtn">OK</button>
</div>

<h1>Guitar 10.17</h1>

<div class="melody">
  <input id="melodyInput" placeholder="6/3 5/2 d:6-1@200$Am">
  <button id="playBtn">Играть</button>
</div>

<div class="box" id="box" style="display:none;"></div>

<div class="chords" style="display:none;">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script>
let audioCtx = null;
const audioBuffers = {};
const heldFrets = {};
let currentChord = null;
let pointerDown = false;
const touchedStrings = new Set();

const chords = {
  "Am": {2:1,3:2,4:2},
  "Em": {5:2,4:2},
  "C": {2:1,4:2,5:3},
  "G": {1:3,6:3,5:2},
  "Dm": {1:1,2:3,3:2},
  "E": {3:1,4:2,5:2},
  "A": {2:2,3:2,4:2},
  "D": {1:2,2:3,3:2}
};

const SOUND_FILES = {};
for(let s=1;s<=6;s++){
  SOUND_FILES[s] = `sounds/${s}.mp3`;
  for(let f=1;f<=6;f++) SOUND_FILES[`${s}-${f}`]=`sounds/${s}-${f}.mp3`;
}

function unlockAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
}

function playSound(key){
  if(!audioCtx) unlockAudio();
  if(!audioBuffers[key]) {
    fetch(SOUND_FILES[key])
      .then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{ audioBuffers[key]=decoded; playSound(key); })
      .catch(err=>console.error("Audio error:", key, err));
    return;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.connect(audioCtx.destination);
  src.start(0);
}

function initGuitar(){
  const box = document.getElementById("box");
  const chordsDiv = document.querySelector(".chords");
  box.style.display="flex";
  chordsDiv.style.display="grid";

  // Создание струн и ладов
  for(let s=6;s>=1;s--){
    const stringEl=document.createElement("div");
    stringEl.className="string";
    stringEl.dataset.string=s;

    for(let f=1;f<=6;f++){
      const fret=document.createElement("div");
      fret.className="fret";
      fret.textContent=f;
      fret.dataset.string=s;
      fret.dataset.fret=f;

      fret.addEventListener("pointerdown",e=>{
        e.stopPropagation();
        unlockAudio();
        heldFrets[s]=f;
        fret.classList.add("active");
      });

      const release=()=>{ 
        delete heldFrets[s]; 
        fret.classList.remove("active"); 
      };
      fret.addEventListener("pointerup",release);
      fret.addEventListener("pointerleave",release);
      fret.addEventListener("pointercancel",release);

      stringEl.appendChild(fret);
    }

    const strum=document.createElement("div");
    strum.className="strum";
    strum.dataset.string=s;

    strum.addEventListener("pointerdown",e=>{
      unlockAudio();
      pointerDown=true;
      touchedStrings.clear();
      handleStrum(e);
    });

    stringEl.appendChild(strum);
    box.appendChild(stringEl);
  }

  // Воспроизведение ноты
  function playNote(s,f,chordName){
    let key=String(s);
    if(f!=null) key=`${s}-${f}`;
    else if(chordName && chords[chordName]?.[s]) key=`${s}-${chords[chordName][s]}`;

    playSound(key);

    const strumEl=document.querySelector(`.string[data-string="${s}"] .strum`);
    if(strumEl){
      strumEl.classList.add("active");
      setTimeout(()=>strumEl?.classList.remove("active"),150);
    }

    if(f!=null){
      const fretEl=document.querySelector(`.fret[data-string="${s}"][data-fret="${f}"]`);
      if(fretEl) fretEl.classList.add("active");
      setTimeout(()=>{ if(!heldFrets[s]) fretEl.classList.remove("active"); },150);
    }
  }

  function playString(s){
    let f=null;
    if(heldFrets[s]!=null) f=heldFrets[s];
    else if(currentChord && chords[currentChord]?.[s]) f=chords[currentChord][s];
    playNote(s,f,null);
  }

  function handleStrum(e){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(!el || !el.classList.contains("strum")) return;

    const s=el.dataset.string;
    if(!s || touchedStrings.has(s)) return;

    touchedStrings.add(s);
    playString(s);
  }

  document.addEventListener("pointermove",e=>{
    if(pointerDown){ e.preventDefault(); handleStrum(e); }
  },{passive:false});

  document.addEventListener("pointerup",()=>{
    pointerDown=false;
    touchedStrings.clear();
  });

  // Свайп извне
  document.addEventListener("pointerdown", e => {
    if (e.target.closest("input, button")) return;
    const rect = box.getBoundingClientRect();
    const margin = 60;
    if (
      e.clientX >= rect.left - margin &&
      e.clientX <= rect.right + margin &&
      e.clientY >= rect.top &&
      e.clientY <= rect.bottom
    ){
      unlockAudio();
      pointerDown = true;
      touchedStrings.clear();
      handleStrum(e);
    }
  });

  // Аккорды
  const buttons=document.querySelectorAll(".chords button");
  buttons.forEach(btn=>{
    btn.addEventListener("pointerdown",e=>{
      e.preventDefault();
      unlockAudio();
      pointerDown=false; touchedStrings.clear();

      const name=btn.dataset.chord;
      if(currentChord===name){
        currentChord=null;
        btn.classList.remove("active");
        document.querySelectorAll(".fret").forEach(f=>f.classList.remove("chord-active","active"));
        for(let k in heldFrets) delete heldFrets[k];
        return;
      }

      document.querySelectorAll(".fret").forEach(f=>f.classList.remove("chord-active","active"));
      buttons.forEach(b=>b.classList.remove("active"));
      for(let k in heldFrets) delete heldFrets[k];

      currentChord=name;
      btn.classList.add("active");

      for(let s in chords[name]){
        heldFrets[s]=chords[name][s];
        const el=document.querySelector(`.fret[data-string="${s}"][data-fret="${chords[name][s]}"]`);
        el?.classList.add("chord-active");
      }
    });
  });

  // Мелодия
  document.getElementById("playBtn").onclick = () => {
    const text = document.getElementById("melodyInput").value.trim();
    if(!text) return;

    buttons.forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".fret").forEach(f=>f.classList.remove("chord-active","active"));
    currentChord=null;
    for(let k in heldFrets) delete heldFrets[k];

    playMelody(text);
  };

  function playMelody(text){
    const tokens=text.trim().split(/\s+/);
    let i=0;

    function step(){
      if(i>=tokens.length) return;
      const t=tokens[i];

      if(t.startsWith("d")||t.startsWith("u")){
        const dir=t[0];
        const range=t.match(/:(\d+)-(\d+)/);
        const speed=t.match(/@(\d+)/);
        const chord=t.match(/\$(\w+)/);
        let s1=null, s2=null, sp=80, ch=null;
        if(range){ s1=+range[1]; s2=+range[2]; }
        if(speed) sp=+speed[1];
        if(chord) ch=chord[1];
        if(s1===null || s2===null){
          if(dir==="d"){ s1=6; s2=1; } else { s1=1; s2=6; }
        }
        strum(s1,s2,sp,ch);
        i++;
        setTimeout(step, sp*Math.abs(s2-s1)+sp);
        return;
      }

      if(t.includes("/")){
        const [s,f]=t.split("/");
        playNote(+s,+f,null);
      } else if(/^[1-6]$/.test(t)) playString(+t);

      i++;
      setTimeout(step,250);
    }
    step();
  }

  function strum(s1,s2,sp,ch){
    let step = s1<=s2?1:-1;
    for(let s=s1,i=0; step>0 ? s<=s2 : s>=s2; s+=step,i++){
      setTimeout(()=>{
        let fret=null;
        if(ch && chords[ch]?.[s]) fret=chords[ch][s];
        playNote(s,fret,ch);
      }, i*sp);
    }
  }

  document.addEventListener("contextmenu",e=>e.preventDefault());
}

// Welcome screen
document.getElementById("okBtn").onclick = () => {
  document.getElementById("welcome").style.display="none";
  initGuitar();
};
</script>

</body>
</html>
