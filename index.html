<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guitar Chords + Melody</title>

<style>
body {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  background-color: pink;
  font-family: sans-serif;
}

.box { 
  display: flex; 
  gap: 15px; 
  touch-action: none;
  margin-top: 20px;
}

.string {
  display: flex;
  flex-direction: column;
  width: 50px;
  height: 60vh;
  border: 2px solid black;
  background: lightgrey;
}

.fret {
  flex: 0 0 8%;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  cursor: pointer;
}

.fret.active { background: orange; }

.strum { 
  flex:1; 
  background: rgba(0,0,0,0.05);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  cursor: pointer;
}
.strum.active { background: orange; }

.chords {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
}

.chords button {
  padding: 8px 12px;
  font-size: 14px;
}

.chords button.active {
  background: orange;
}

.melody-input {
  margin-top: 10px;
  display: flex;
  gap: 5px;
}

.melody-input input {
  width: 180px;
  padding: 5px;
  font-size: 14px;
}

.melody-input button {
  padding: 5px 10px;
  font-size: 14px;
  cursor: pointer;
}

h1 {
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<h1>Guitar Pro Chords + Melody</h1>

<div class="box" id="box"></div>

<div class="melody-input">
  <input type="text" id="melodyInput" placeholder="Напр. 1 2-3 3 4-2 5 6">
  <button id="playMelodyBtn">Играть</button>
</div>

<script>
const box = document.getElementById("box");
let pointerDown = false;
const touched = new Set();
const heldFrets = {};
let currentChord = null;

// аккорды
const chords = {
  "Am": {2:1, 3:2, 4:2},
  "Em": {5:2, 4:2},
  "C":  {2:1, 4:2, 5:3},
  "G":  {1:3, 6:3, 5:2},
  "Dm": {1:1, 2:3, 3:2},
  "E":  {3:1, 4:2, 5:2},
  "A":  {2:2, 3:2, 4:2},
  "D":  {1:2, 2:3, 3:2}
};

// создаем струны и лады
for (let s = 6; s >= 1; s--) {
  const stringEl = document.createElement("div");
  stringEl.className = "string";
  stringEl.dataset.string = s;

  for (let f = 1; f <= 6; f++) {
    const fret = document.createElement("div");
    fret.className = "fret";
    fret.textContent = f;
    fret.dataset.string = s;
    fret.dataset.fret = f;

    // ручное зажатие ладов
    fret.addEventListener("pointerdown", e => {
      e.stopPropagation();
      if (currentChord) return;
      heldFrets[s] = f;
      fret.classList.add("active");
    });

    const release = () => {
      if (currentChord) return;
      delete heldFrets[s];
      fret.classList.remove("active");
    };

    fret.addEventListener("pointerup", release);
    fret.addEventListener("pointerleave", release);
    fret.addEventListener("pointercancel", release);

    stringEl.appendChild(fret);
  }

  const strum = document.createElement("div");
  strum.className = "strum";
  stringEl.appendChild(strum);

  box.appendChild(stringEl);
}

// аудио
const audios = {};
for (let s = 1; s <= 6; s++) {
  audios[s] = new Audio(`sounds/${s}.mp3`);
  for (let f = 1; f <= 6; f++) {
    audios[`${s}-${f}`] = new Audio(`sounds/${s}-${f}.mp3`);
  }
}

// воспроизведение ноты
function playString(string, fret=null) {
  const key = fret ? `${string}-${fret}` : (heldFrets[string] || string);
  const audio = audios[key];
  if (!audio) return;
  audio.currentTime = 0;
  audio.play();

  // подсветка струны
  const el = document.querySelector(`[data-string="${string}"] .strum`);
  if (el) {
    el.classList.add("active");
    setTimeout(()=>el.classList.remove("active"),100);
  }
}

// свайп по струнам
function handlePointer(e){
  const el = document.elementFromPoint(e.clientX,e.clientY);
  const stringEl = el?.closest(".string");
  if (!stringEl) return;
  const s = stringEl.dataset.string;
  if (touched.has(s)) return;
  touched.add(s);
  playString(s);
}

box.addEventListener("pointerdown", e=>{
  pointerDown = true;
  touched.clear();
  handlePointer(e);
});

document.addEventListener("pointermove", e=>{
  if (!pointerDown) return;
  e.preventDefault();
  handlePointer(e);
});

document.addEventListener("pointerup", ()=>{
  pointerDown = false;
  touched.clear();
});

// кнопки аккордов
const buttons = document.querySelectorAll(".chords button");

buttons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const chordName = btn.dataset.chord;

    if (currentChord === chordName){
      clearChord();
      currentChord = null;
      btn.classList.remove("active");
      return;
    }

    clearChord();
    currentChord = chordName;

    buttons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    const chord = chords[chordName];
    for (let string in chord){
      heldFrets[string] = chord[string];
      const el = document.querySelector(
        `.fret[data-string="${string}"][data-fret="${chord[string]}"]`
      );
      if (el) el.classList.add("active");
    }
  });
});

function clearChord(){
  for (let key in heldFrets) delete heldFrets[key];
  document.querySelectorAll(".fret").forEach(f=>f.classList.remove("active"));
}

// мелодия с возможностью указывать лад
function playMelody(sequence, speed=300){
  return new Promise(resolve=>{
    let notes = sequence.trim().split(/\s+/);
    let i=0;
    function step(){
      if (i>=notes.length) return resolve();
      let note = notes[i];
      let fret = null;
      let s = note;

      if (note.includes('-')){
        const parts = note.split('-');
        s = parts[0];
        fret = parts[1];
      }

      if (/^[1-6]$/.test(s)) playString(s,fret);
      i++;
      setTimeout(step,speed);
    }
    step();
  });
}

document.getElementById("playMelodyBtn").addEventListener("click", ()=>{
  const input = document.getElementById("melodyInput").value;
  if (!input) return;
  playMelody(input,250);
});

// отключаем контекстное меню
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
