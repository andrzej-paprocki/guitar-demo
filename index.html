<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m.Guitar</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>m.Guitar</h1>

<div class="melody">
  <div class="melodyRow">
    <input id="melodyInput" placeholder="6 - 3 - 2 - 1 - 2 - 3 - 6 - 3 - 2 - 1 - 2 - 3 - 6 - 3 - 2 - 1 - 2 - 3 - 6 - 3 - 2 - 1 - 2 - 2/5 - 16 - 3 - 2 - 16 - 2 - 3 - 6 - 3 - d:2-1@10 - - d:2-1@10 - - d:3-1@10 - - 25 - 3/5 - 2/5 - 1/2 - 2/5 - 3/5 - 5 - 3/5 - 2/5 - d:2-1@10 - - d:1-3@10 - - d:1-3@10 - - 5 - 3 - 3/5 - 2/5 - 3/5 - d:3-1@10 - - 2/5 - 3/5 - d:1-3@10 - - d:1-3@10 - - d:2-4@10 - - d:1-3@10 ">
    
    <button id="playBtn">Play</button>
  </div>

  <!-- Speed slider -->
  <input type="range" id="speedControl" min="0.5" max="2" step="0.1" value="1">
  <div id="speedLabel">Speed: 1.0x</div>

</div>

<div class="wrapper">
  <div class="box" id="box">
    <div class="barreColumn" id="barreColumn"></div>
  </div>
</div>

<div class="chords">
  <button data-chord="Am">Am</button>
  <button data-chord="Em">Em</button>
  <button data-chord="C">C</button>
  <button data-chord="G">G</button>
  <button data-chord="Dm">Dm</button>
  <button data-chord="E">E</button>
  <button data-chord="A">A</button>
  <button data-chord="D">D</button>
</div>

<script src = "script.js">
</script>

</body>
</html>
